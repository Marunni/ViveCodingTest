<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Battle Fleet</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    ::-webkit-scrollbar { display: none; }

    @keyframes starField {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes planetGlow {
      0%, 100% { box-shadow: -30px -10px 60px rgba(40,120,200,0.15), inset -20px -10px 40px rgba(0,0,0,0.6); }
      50% { box-shadow: -30px -10px 80px rgba(50,140,220,0.2), inset -20px -10px 40px rgba(0,0,0,0.6); }
    }
    @keyframes lineExpand {
      0% { width: 0; opacity: 0; }
      100% { width: 100%; opacity: 1; }
    }
    @keyframes btnIdle {
      0%, 100% { border-color: rgba(80,200,160,0.3); }
      50% { border-color: rgba(80,200,160,0.6); }
    }
    @keyframes shipFly {
      0% { transform: translateX(100vw); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-100vw); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
// ============================================================
// SPACE BATTLE FLEET - Complete RTS Game
// React + HTML5 Canvas + Tailwind CSS (Single File)
// ============================================================

const { useState, useRef, useEffect, useCallback } = React;

// ==================== CONSTANTS ====================
const MAP_W = 3000;
const MAP_H = 2000;
const BASE_POP = 100;
const POP_PER_LEVEL = 5;
const ATTACK_RANGE = 120;
const CAMERA_SPEED = 1000;
const EDGE_SCROLL_MARGIN = 30;
const EDGE_SCROLL_SPEED = 1000;
const MIN_ZOOM = 0.4;
const MAX_ZOOM = 1.5;
const ZOOM_STEP = 0.1;
const UI_SYNC_INTERVAL = 0.1;
const AI_PULSE_INTERVAL = 5;
const SEPARATION_DIST = 35;
const SEPARATION_STRENGTH = 100;
const PLANET_RADIUS = 30;

const UNIT_STATS = {
    1: { name: '요격기', hp: 24, atk: 6, speed: 144, spawnTime: 4.8, radius: 6, pop: 1, gold: 1, shape: 'triangle', maxTargets: 1 },
  2: { name: '구축함', hp: 96, atk: 18, speed: 80, spawnTime: 9.6, radius: 9, pop: 2, gold: 2, shape: 'square', maxTargets: 2 },
  3: { name: '전함', hp: 320, atk: 40, speed: 40, spawnTime: 14.4, radius: 14, pop: 3, gold: 3, shape: 'circle', maxTargets: 3 },
};

const ENEMY_UNIT_NAMES = { 1: '맹독충', 2: '칼날벌레', 3: '거대갑충' };

const FACTION_COLORS = {
  0: { main: '#888888', light: '#aaaaaa', dark: '#555555', glow: 'rgba(136,136,136,0.3)' },
  1: { main: '#4499ff', light: '#66bbff', dark: '#2266cc', glow: 'rgba(68,153,255,0.4)' },
  2: { main: '#ff4455', light: '#ff6677', dark: '#cc2233', glow: 'rgba(255,68,85,0.4)' },
};

// Minimap
const MM_W = 300;
const MM_H = 300;
const MM_MARGIN = 10;

// ==================== SHIP IMAGES ====================
const SHIP_IMAGES = {};
const SHIP_IMG_LOADED = { 1: false, 2: false, 3: false };
function preloadShipImages() {
  const files = { 1: 'r요격기.jpg', 2: 'r구축함.jpg', 3: 'r전함.jpg' };
  for (const [type, file] of Object.entries(files)) {
    const img = new Image();
    img.onload = () => { SHIP_IMG_LOADED[type] = true; };
    img.src = file;
    SHIP_IMAGES[type] = img;
  }
}
preloadShipImages();

// ==================== HELPERS ====================
let _idCounter = 0;
const genId = () => `e${++_idCounter}`;
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ==================== APP COMPONENT ====================
const App = () => {
  const canvasRef = useRef(null);
  const animFrameRef = useRef(null);

  // ---- Game State (useRef - no re-renders) ----
  const G = useRef({
    phase: 'start',
    gameResult: '',
    planets: [],
    units: [],
    particles: [],
    stars: [],
    camera: { x: 0, y: 0, w: 800, h: 600, zoom: 1 },
    mouse: { x: 0, y: 0, down: false, button: -1, dragSX: 0, dragSY: 0, isDragging: false },
    keys: new Set(),
    selectedPlanetIds: new Set(),
    selectedUnitIds: new Set(),
    controlGroups: { 1: new Set(), 2: new Set(), 3: new Set(), 4: new Set() },
    playerGold: 0,
    playerPop: 0,
    aiPop: 0,
    aiTimer: 0,
    uiSyncTimer: 0,
    lastClickTime: 0,
    lastClickPlanetId: null,
    isMinimapDragging: false,
    lastFrameTime: 0,
    stats: { produced: {1:0,2:0,3:0}, kills: {1:0,2:0,3:0}, goldEarned: 0, planetsCaptured: 0 },
  });

  // ---- UI State (useState - periodic sync) ----
  const [ui, setUi] = useState({
    phase: 'start',
    gameResult: '',
    playerGold: 0,
    playerPop: 0,
    playerMaxPop: BASE_POP,
    selectedPlanets: [],
    selectedUnitsCount: 0,
    controlGroupCounts: { 1: 0, 2: 0, 3: 0, 4: 0 },
  });

  // ==================== GAME INITIALIZATION ====================
  const initGame = useCallback(() => {
    const g = G.current;
    _idCounter = 0;
    g.planets = [];
    g.units = [];
    g.particles = [];
    g.playerGold = 0;
    g.playerPop = 0;
    g.aiPop = 0;
    g.aiTimer = 0;
    g.uiSyncTimer = 0;
    g.selectedPlanetIds = new Set();
    g.selectedUnitIds = new Set();
    g.controlGroups = { 1: new Set(), 2: new Set(), 3: new Set(), 4: new Set() };
    g.gameResult = '';
    g.stats = { produced: {1:0,2:0,3:0}, kills: {1:0,2:0,3:0}, goldEarned: 0, planetsCaptured: 0 };

    // Player planets (left side)
    g.planets.push(createPlanet(350, 650, 1, 1000));
    g.planets.push(createPlanet(350, 1350, 1, 1000));

    // AI planets (right side)
    g.planets.push(createPlanet(2650, 650, 2, 1000));
    g.planets.push(createPlanet(2650, 1350, 2, 1000));

    // Neutral planets (random, min 150px apart)
    const neutralCount = 15;
    let attempts = 0;
    while (g.planets.length < 4 + neutralCount && attempts < 5000) {
      attempts++;
      const nx = 200 + Math.random() * (MAP_W - 400);
      const ny = 150 + Math.random() * (MAP_H - 300);
      let tooClose = false;
      for (const p of g.planets) {
        if (dist(nx, ny, p.x, p.y) < 180) { tooClose = true; break; }
      }
      if (!tooClose) {
        g.planets.push(createPlanet(nx, ny, 0, 400));
      }
    }

    // Camera initial: center on player area
    const canvas = canvasRef.current;
    g.camera.w = canvas.width;
    g.camera.h = canvas.height;
    g.camera.zoom = 1;
    const viewW = g.camera.w / g.camera.zoom;
    const viewH = g.camera.h / g.camera.zoom;
    g.camera.x = clamp(350 - viewW / 2, 0, MAP_W - viewW);
    g.camera.y = clamp(1000 - viewH / 2, 0, MAP_H - viewH);

    g.phase = 'playing';
    g.lastFrameTime = performance.now();

    setUi(prev => ({ ...prev, phase: 'playing', gameResult: '', playerGold: 0, playerPop: 0 }));
  }, []);

  function createPlanet(x, y, owner, hp) {
    return {
      id: genId(), x, y, radius: PLANET_RADIUS,
      owner, hp, maxHp: owner === 0 ? 400 : 1000,
      level: 1,
      productionType: 1,
      spawnTimer: 0,
      rallyPoint: null,
      rallyPointPlanetId: null,
    };
  }

  // ==================== SPAWN UNIT ====================
  function spawnUnit(planet, g) {
    const stats = UNIT_STATS[planet.productionType];
    const maxPop = getMaxPop(planet.owner, g);
    const pop = planet.owner === 1 ? g.playerPop : g.aiPop;
    if (pop + stats.pop > maxPop) return null;

    const angle = Math.random() * Math.PI * 2;
    const spawnDist = planet.radius + stats.radius + 8;
    const u = {
      id: genId(),
      owner: planet.owner,
      type: planet.productionType,
      x: planet.x + Math.cos(angle) * spawnDist,
      y: planet.y + Math.sin(angle) * spawnDist,
      hp: stats.hp,
      maxHp: stats.hp,
      vx: 0, vy: 0,
      state: 'IDLE',
      homePlanetId: planet.id,
      targetPlanetId: null,
      targetX: null, targetY: null,
      attackCooldown: 0,
      attackTargetId: null,
      attackAnim: 0,
      attackAngle: 0,
    };

    if (planet.owner === 1) {
      g.playerPop += stats.pop;
      g.stats.produced[planet.productionType]++;
    } else {
      g.aiPop += stats.pop;
    }

    // If rally point set, immediately depart
    if (planet.rallyPoint) {
      u.state = 'MOVING';
      u.homePlanetId = null;
      u.targetX = planet.rallyPoint.x;
      u.targetY = planet.rallyPoint.y;
      u.targetPlanetId = planet.rallyPointPlanetId || null;
    }

    return u;
  }

  // ==================== UPDATE FUNCTIONS ====================
  function update(dt) {
    const g = G.current;
    if (g.phase !== 'playing') return;

    updateCamera(dt, g);
    updatePlanets(dt, g);
    updateUnits(dt, g);
    updateParticles(dt, g);
    updateAI(dt, g);
    checkWinLose(g);
    syncUI(dt, g);
  }

  function updateCamera(dt, g) {
    const spd = CAMERA_SPEED * dt;
    const k = g.keys;
    if (k.has('KeyW') || k.has('ArrowUp')) g.camera.y -= spd;
    if (k.has('KeyS') || k.has('ArrowDown')) g.camera.y += spd;
    if (k.has('KeyA') || k.has('ArrowLeft')) g.camera.x -= spd;
    if (k.has('KeyD') || k.has('ArrowRight')) g.camera.x += spd;

    // Edge scrolling
    const mx = g.mouse.x;
    const my = g.mouse.y;
    const sw = g.camera.w * g.camera.zoom;
    const sh = g.camera.h * g.camera.zoom;
    const espd = EDGE_SCROLL_SPEED * dt;
    if (mx <= EDGE_SCROLL_MARGIN) g.camera.x -= espd;
    if (mx >= sw - EDGE_SCROLL_MARGIN) g.camera.x += espd;
    if (my <= EDGE_SCROLL_MARGIN) g.camera.y -= espd;
    if (my >= sh - EDGE_SCROLL_MARGIN) g.camera.y += espd;

    const viewW = g.camera.w / g.camera.zoom;
    const viewH = g.camera.h / g.camera.zoom;
    g.camera.x = clamp(g.camera.x, 0, Math.max(0, MAP_W - viewW));
    g.camera.y = clamp(g.camera.y, 0, Math.max(0, MAP_H - viewH));
  }

  function getMaxPop(owner, g) {
    let totalLevels = 0;
    for (const p of g.planets) {
      if (p.owner === owner) totalLevels += p.level;
    }
    return BASE_POP + POP_PER_LEVEL * totalLevels;
  }

  function updatePlanets(dt, g) {
    for (const p of g.planets) {
      if (p.owner === 0) continue; // neutrals don't produce
      const stats = UNIT_STATS[p.productionType];
      const reduction = Math.min(0.9, 0.1 * (p.level - 1));
      const adjSpawnTime = stats.spawnTime * (1 - reduction);

      p.spawnTimer += dt;
      if (p.spawnTimer >= adjSpawnTime) {
        p.spawnTimer -= adjSpawnTime;
        const u = spawnUnit(p, g);
        if (u) g.units.push(u);
      }
    }
  }

  function updateUnits(dt, g) {
    // Separation pass
    const len = g.units.length;
    for (let i = 0; i < len; i++) {
      const a = g.units[i];
      let sepX = 0, sepY = 0;
      for (let j = 0; j < len; j++) {
        if (i === j) continue;
        const b = g.units[j];
        const dx = b.x - a.x;
        if (Math.abs(dx) > SEPARATION_DIST) continue;
        const dy = b.y - a.y;
        if (Math.abs(dy) > SEPARATION_DIST) continue;
        const d = Math.hypot(dx, dy);
        const minD = UNIT_STATS[a.type].radius + UNIT_STATS[b.type].radius + 4;
        if (d < minD && d > 0.1) {
          const force = (minD - d) / minD;
          sepX -= (dx / d) * force;
          sepY -= (dy / d) * force;
        }
      }
      a.x += sepX * SEPARATION_STRENGTH * dt;
      a.y += sepY * SEPARATION_STRENGTH * dt;
    }

    // Per-unit update
    for (const u of g.units) {
      u.attackCooldown -= dt;
      if (u.attackAnim > 0) u.attackAnim = Math.max(0, u.attackAnim - dt * 4);

      // Find attack targets (prioritize enemy units, then planets)
      const stats = UNIT_STATS[u.type];
      const maxTargets = stats.maxTargets || 1;
      let unitTargets = [];
      let planetTarget = null;
      let planetDist = ATTACK_RANGE;

      // Collect enemy units in range sorted by distance
      const enemiesInRange = [];
      for (const e of g.units) {
        if (e.owner === u.owner || e.hp <= 0) continue;
        const dx = e.x - u.x;
        if (Math.abs(dx) > ATTACK_RANGE) continue;
        const dy = e.y - u.y;
        if (Math.abs(dy) > ATTACK_RANGE) continue;
        const d = Math.hypot(dx, dy);
        if (d < ATTACK_RANGE) {
          enemiesInRange.push({ target: e, dist: d });
        }
      }
      enemiesInRange.sort((a, b) => a.dist - b.dist);
      unitTargets = enemiesInRange.slice(0, maxTargets);

      // Check enemy/neutral planets (only if no enemy unit found)
      if (unitTargets.length === 0) {
        for (const p of g.planets) {
          if (p.owner === u.owner) continue;
          const d = dist(u.x, u.y, p.x, p.y) - p.radius;
          if (d < ATTACK_RANGE && d < planetDist) {
            planetDist = d;
            planetTarget = p;
          }
        }
      }

      const hasTarget = unitTargets.length > 0 || planetTarget;

      // Attack if targets found
      if (hasTarget && u.attackCooldown <= 0) {
        u.attackCooldown = 0.5;
        u.attackAnim = 1.0;

        if (unitTargets.length > 0) {
          u.attackAngle = Math.atan2(unitTargets[0].target.y - u.y, unitTargets[0].target.x - u.x);
          for (const { target: et } of unitTargets) {
            et.hp -= UNIT_STATS[u.type].atk;
            if (et.hp <= 0) {
              const reward = UNIT_STATS[et.type].gold;
              if (u.owner === 1) {
                g.playerGold += reward;
                g.stats.goldEarned += reward;
                g.stats.kills[et.type]++;
              }
              const deadPop = UNIT_STATS[et.type].pop;
              if (et.owner === 1) g.playerPop -= deadPop;
              else g.aiPop -= deadPop;
            }
            // Spawn laser particle for each target
            g.particles.push({
              type: 'laser',
              x1: u.x, y1: u.y,
              x2: et.x, y2: et.y,
              color: FACTION_COLORS[u.owner].light,
              life: 0.15, maxLife: 0.15,
            });
          }
        } else if (planetTarget) {
          u.attackAngle = Math.atan2(planetTarget.y - u.y, planetTarget.x - u.x);
          planetTarget.hp -= UNIT_STATS[u.type].atk;
          if (planetTarget.hp <= 0) {
            capturePlanet(planetTarget, u.owner, g);
          }
          g.particles.push({
            type: 'laser',
            x1: u.x, y1: u.y,
            x2: planetTarget.x, y2: planetTarget.y,
            color: FACTION_COLORS[u.owner].light,
            life: 0.15, maxLife: 0.15,
          });
        }
      }

      // Movement logic
      if (unitTargets.length > 0) {
        // Stop to fight enemy units
        u.vx = 0; u.vy = 0;
      } else if (u.targetX !== null && u.targetY !== null) {
        // Move toward target
        const dx = u.targetX - u.x;
        const dy = u.targetY - u.y;
        const d = Math.hypot(dx, dy);
        const stats = UNIT_STATS[u.type];

        // Check if arrived at target planet
        if (u.targetPlanetId) {
          const tp = g.planets.find(p => p.id === u.targetPlanetId);
          if (tp) {
            const arrivalDist = tp.radius + stats.radius + 15;
            if (d < arrivalDist || dist(u.x, u.y, tp.x, tp.y) < arrivalDist) {
              // Arrived at planet
              if (tp.owner === u.owner) {
                // Friendly planet - check for chain rally
                if (tp.rallyPoint) {
                  u.targetX = tp.rallyPoint.x;
                  u.targetY = tp.rallyPoint.y;
                  u.targetPlanetId = tp.rallyPointPlanetId || null;
                } else {
                  u.state = 'IDLE';
                  u.homePlanetId = tp.id;
                  u.targetX = null; u.targetY = null;
                  u.targetPlanetId = null;
                  u.vx = 0; u.vy = 0;
                }
              }
              // Enemy/neutral planet: keep attacking (handled above)
            } else {
              const speed = stats.speed;
              u.vx = (dx / d) * speed;
              u.vy = (dy / d) * speed;
            }
          } else {
            // Target planet doesn't exist
            u.targetPlanetId = null;
            u.targetX = null; u.targetY = null;
          }
        } else {
          // Moving to coordinates
          if (d < 10) {
            u.state = 'IDLE_FIELD';
            u.targetX = null; u.targetY = null;
            u.vx = 0; u.vy = 0;
          } else {
            const speed = UNIT_STATS[u.type].speed;
            u.vx = (dx / d) * speed;
            u.vy = (dy / d) * speed;
          }
        }
      } else {
        // No target, stay idle
        u.vx = 0; u.vy = 0;
      }

      // Apply velocity
      u.x += u.vx * dt;
      u.y += u.vy * dt;

      // Clamp to map
      u.x = clamp(u.x, 5, MAP_W - 5);
      u.y = clamp(u.y, 5, MAP_H - 5);
    }

    // Remove dead units
    g.units = g.units.filter(u => u.hp > 0);

    // Clean up selected unit IDs (remove dead)
    const aliveIds = new Set(g.units.map(u => u.id));
    for (const id of g.selectedUnitIds) {
      if (!aliveIds.has(id)) g.selectedUnitIds.delete(id);
    }
    for (const key of [1,2,3,4]) {
      for (const id of g.controlGroups[key]) {
        if (!aliveIds.has(id)) g.controlGroups[key].delete(id);
      }
    }
  }

  function capturePlanet(planet, newOwner, g) {
    // Gold reward based on planet level before reset
    if (newOwner === 1) {
      const reward = planet.level * 20;
      g.playerGold += reward;
      g.stats.goldEarned += reward;
      g.stats.planetsCaptured++;
    }
    planet.owner = newOwner;
    planet.maxHp = newOwner === 0 ? 400 : 1000;
    planet.hp = planet.maxHp;
    planet.level = 1;
    planet.productionType = 1;
    planet.spawnTimer = 0;
    planet.rallyPoint = null;
    planet.rallyPointPlanetId = null;
    // Units at this planet become homeless
    for (const u of g.units) {
      if (u.homePlanetId === planet.id && u.owner !== newOwner) {
        u.homePlanetId = null;
      }
    }
  }

  function updateParticles(dt, g) {
    for (const p of g.particles) {
      p.life -= dt;
    }
    g.particles = g.particles.filter(p => p.life > 0);
  }

  function updateAI(dt, g) {
    g.aiTimer += dt;
    if (g.aiTimer < AI_PULSE_INTERVAL) return;
    g.aiTimer -= AI_PULSE_INTERVAL;

    const aiPlanets = g.planets.filter(p => p.owner === 2);
    const hostilePlanets = g.planets.filter(p => p.owner !== 2);

    for (const p of aiPlanets) {
      // 30% chance to change production type
      if (Math.random() < 0.3) {
        const r = Math.random();
        if (r < 0.5) p.productionType = 1;
        else if (r < 0.8) p.productionType = 2;
        else p.productionType = 3;
      }

      // Count idle units at this planet
      const idleUnits = g.units.filter(u => u.owner === 2 && u.homePlanetId === p.id && u.state === 'IDLE');
      if (idleUnits.length > 5 && hostilePlanets.length > 0) {
        const target = hostilePlanets[Math.floor(Math.random() * hostilePlanets.length)];
        for (const u of idleUnits) {
          u.state = 'MOVING';
          u.homePlanetId = null;
          u.targetPlanetId = target.id;
          u.targetX = target.x;
          u.targetY = target.y;
        }
      }
    }

    // AI upgrade: if AI has gold (simulated), upgrade random planet
    // AI doesn't use gold system (simplified), but we give AI auto-upgrades over time
    for (const p of aiPlanets) {
      if (Math.random() < 0.15 && p.level < 10) {
        const baseHp = 1000;
        const hpGain = baseHp * 0.2;
        p.level++;
        p.maxHp = baseHp * (1 + 0.2 * (p.level - 1));
        p.hp = Math.min(p.maxHp, p.hp + hpGain);
      }
    }
  }

  function checkWinLose(g) {
    const playerPlanets = g.planets.filter(p => p.owner === 1).length;
    const aiPlanets = g.planets.filter(p => p.owner === 2).length;

    if (aiPlanets === 0) {
      g.phase = 'gameover';
      g.gameResult = 'victory';
      setUi(prev => ({ ...prev, phase: 'gameover', gameResult: 'victory', gameStats: {...g.stats} }));
    } else if (playerPlanets === 0) {
      g.phase = 'gameover';
      g.gameResult = 'defeat';
      setUi(prev => ({ ...prev, phase: 'gameover', gameResult: 'defeat', gameStats: {...g.stats} }));
    }
  }

  function syncUI(dt, g) {
    g.uiSyncTimer += dt;
    if (g.uiSyncTimer < UI_SYNC_INTERVAL) return;
    g.uiSyncTimer -= UI_SYNC_INTERVAL;

    const selPlanets = g.planets.filter(p => g.selectedPlanetIds.has(p.id));
    setUi({
      phase: g.phase,
      gameResult: g.gameResult,
      playerGold: g.playerGold,
      playerPop: g.playerPop,
      playerMaxPop: getMaxPop(1, g),
      selectedPlanets: selPlanets.map(p => ({
        id: p.id, hp: p.hp, maxHp: p.maxHp, level: p.level,
        productionType: p.productionType, owner: p.owner,
      })),
      selectedUnitsCount: g.selectedUnitIds.size,
      controlGroupCounts: {
        1: g.controlGroups[1].size,
        2: g.controlGroups[2].size,
        3: g.controlGroups[3].size,
        4: g.controlGroups[4].size,
      },
    });
  }

  // ==================== RENDER ====================
  function render(ctx) {
    const g = G.current;
    const cam = g.camera;
    const W = ctx.canvas.width;
    const H = ctx.canvas.height;

    // Clear
    ctx.fillStyle = '#080812';
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.save();
    for (const s of g.stars) {
      const sx = s.x * 0.7 - cam.x * 0.3;
      const sy = s.y * 0.7 - cam.y * 0.3;
      if (sx < -5 || sx > W + 5 || sy < -5 || sy > H + 5) continue;
      ctx.globalAlpha = s.brightness;
      ctx.fillStyle = s.color;
      ctx.fillRect(sx, sy, s.size, s.size);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // World transform
    ctx.save();
    ctx.scale(cam.zoom, cam.zoom);
    ctx.translate(-cam.x, -cam.y);

    // Map border
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, MAP_W, MAP_H);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= MAP_W; x += 200) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, MAP_H); ctx.stroke();
    }
    for (let y = 0; y <= MAP_H; y += 200) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(MAP_W, y); ctx.stroke();
    }

    // Rally point lines
    for (const p of g.planets) {
      if (p.owner === 1 && p.rallyPoint && g.selectedPlanetIds.has(p.id)) {
        ctx.strokeStyle = 'rgba(255,255,100,0.5)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.rallyPoint.x, p.rallyPoint.y);
        ctx.stroke();
        ctx.setLineDash([]);

        // Rally marker
        ctx.fillStyle = 'rgba(255,255,100,0.8)';
        ctx.beginPath();
        ctx.arc(p.rallyPoint.x, p.rallyPoint.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Particles (lasers + move markers)
    for (const p of g.particles) {
      if (p.type === 'laser') {
        const alpha = p.life / p.maxLife;
        ctx.strokeStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x1, p.y1);
        ctx.lineTo(p.x2, p.y2);
        ctx.stroke();
      } else if (p.type === 'moveMarker') {
        const t = 1 - p.life / p.maxLife; // 0 -> 1
        const alpha = p.life / p.maxLife;
        const r = p.radius * (0.6 + t * 0.6);
        ctx.globalAlpha = alpha;
        // Outer ring
        ctx.strokeStyle = '#44ff44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.stroke();
        // Inner X mark
        const x = p.x, y = p.y, s = r * 0.4;
        ctx.beginPath();
        ctx.moveTo(x - s, y - s); ctx.lineTo(x + s, y + s);
        ctx.moveTo(x + s, y - s); ctx.lineTo(x - s, y + s);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Planets
    const viewW = cam.w / cam.zoom;
    const viewH = cam.h / cam.zoom;
    for (const p of g.planets) {
      const sx = p.x - cam.x;
      const sy = p.y - cam.y;
      if (sx < -80 || sx > viewW + 80 || sy < -80 || sy > viewH + 80) continue;

      const colors = FACTION_COLORS[p.owner];
      const R = p.radius;
      const px = p.x;
      const py = p.y;
      const seed = (p.id.charCodeAt(1) || 0) * 137;

      // Clip to circle for planet surface
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py, R, 0, Math.PI * 2);
      ctx.clip();

      if (p.owner === 1) {
        // ---- Player Planet: Teal ocean, green/purple continents, white clouds ----
        // Outer glow
        ctx.shadowColor = 'rgba(60,200,180,0.5)';
        ctx.shadowBlur = 25;

        // Ocean base
        const oceanGrad = ctx.createRadialGradient(px - R * 0.3, py - R * 0.3, R * 0.1, px, py, R);
        oceanGrad.addColorStop(0, '#5ee8c5');
        oceanGrad.addColorStop(0.5, '#2db8a0');
        oceanGrad.addColorStop(1, '#1a7a6d');
        ctx.fillStyle = oceanGrad;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);
        ctx.shadowBlur = 0;

        // Continents (procedural patches)
        const continents = [
          { cx: -0.3, cy: -0.2, rx: 0.45, ry: 0.35, color: '#7a5d8a' },
          { cx: 0.25, cy: 0.15, rx: 0.35, ry: 0.4, color: '#5a8a4a' },
          { cx: -0.1, cy: 0.35, rx: 0.3, ry: 0.2, color: '#8a6d7a' },
          { cx: 0.35, cy: -0.35, rx: 0.25, ry: 0.2, color: '#6a9a5a' },
          { cx: -0.4, cy: 0.1, rx: 0.2, ry: 0.3, color: '#5a7a4a' },
        ];
        for (const c of continents) {
          ctx.fillStyle = c.color;
          ctx.beginPath();
          ctx.ellipse(px + c.cx * R, py + c.cy * R, c.rx * R, c.ry * R, (seed + c.cx * 100) % Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }

        // Cloud swirls
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        const clouds = [
          { cx: 0.2, cy: -0.25, rx: 0.35, ry: 0.08 },
          { cx: -0.15, cy: 0.3, rx: 0.4, ry: 0.1 },
          { cx: 0.1, cy: 0.05, rx: 0.3, ry: 0.06 },
          { cx: -0.3, cy: -0.1, rx: 0.25, ry: 0.07 },
        ];
        for (const cl of clouds) {
          ctx.beginPath();
          ctx.ellipse(px + cl.cx * R, py + cl.cy * R, cl.rx * R, cl.ry * R, (seed * 0.5) % Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.ellipse(px + 0.15 * R, py + 0.35 * R, 0.28 * R, 0.12 * R, 0.8, 0, Math.PI * 2);
        ctx.fill();

        // Atmosphere rim
        const atmGrad = ctx.createRadialGradient(px, py, R * 0.85, px, py, R);
        atmGrad.addColorStop(0, 'rgba(100,230,220,0)');
        atmGrad.addColorStop(1, 'rgba(100,230,220,0.3)');
        ctx.fillStyle = atmGrad;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);

      } else if (p.owner === 2) {
        // ---- Enemy Planet: Olive/yellow-green with brown patches ----
        ctx.shadowColor = 'rgba(150,160,80,0.3)';
        ctx.shadowBlur = 15;

        // Yellow-green base
        const neutralGrad = ctx.createRadialGradient(px - R * 0.25, py - R * 0.2, R * 0.05, px, py, R);
        neutralGrad.addColorStop(0, '#b8c060');
        neutralGrad.addColorStop(0.5, '#8a9a40');
        neutralGrad.addColorStop(1, '#5a6830');
        ctx.fillStyle = neutralGrad;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);
        ctx.shadowBlur = 0;

        // Brown terrain patches
        const patches = [
          { cx: -0.15, cy: 0.1, rx: 0.3, ry: 0.25 },
          { cx: 0.25, cy: -0.2, rx: 0.2, ry: 0.3 },
          { cx: 0.05, cy: 0.3, rx: 0.25, ry: 0.15 },
        ];
        for (const pt of patches) {
          ctx.fillStyle = 'rgba(140,110,70,0.4)';
          ctx.beginPath();
          ctx.ellipse(px + pt.cx * R, py + pt.cy * R, pt.rx * R, pt.ry * R, seed % Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }

        // Subtle darker spots
        ctx.fillStyle = 'rgba(100,80,50,0.25)';
        ctx.beginPath();
        ctx.arc(px + R * 0.15, py - R * 0.1, R * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px - R * 0.25, py + R * 0.2, R * 0.1, 0, Math.PI * 2);
        ctx.fill();

        // Lighting gradient
        const lightGrad = ctx.createRadialGradient(px - R * 0.3, py - R * 0.3, 0, px, py, R);
        lightGrad.addColorStop(0, 'rgba(255,255,200,0.15)');
        lightGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
        lightGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
        ctx.fillStyle = lightGrad;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);

      } else {
        // ---- Neutral Planet: Dark rocky/volcanic with reddish glow ----
        ctx.shadowColor = 'rgba(255,100,60,0.5)';
        ctx.shadowBlur = 25;

        // Dark base
        const rockGrad = ctx.createRadialGradient(px - R * 0.25, py - R * 0.25, R * 0.05, px + R * 0.1, py + R * 0.1, R);
        rockGrad.addColorStop(0, '#c8b0a0');
        rockGrad.addColorStop(0.3, '#8a7060');
        rockGrad.addColorStop(0.6, '#5a4540');
        rockGrad.addColorStop(1, '#2a1a18');
        ctx.fillStyle = rockGrad;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);
        ctx.shadowBlur = 0;

        // Craters and rocky terrain
        const craters = [
          { cx: -0.2, cy: -0.15, r: 0.18 },
          { cx: 0.3, cy: 0.2, r: 0.15 },
          { cx: 0.05, cy: -0.35, r: 0.12 },
          { cx: -0.35, cy: 0.25, r: 0.1 },
          { cx: 0.25, cy: -0.1, r: 0.13 },
        ];
        for (const cr of craters) {
          const cGrad = ctx.createRadialGradient(
            px + cr.cx * R - cr.r * R * 0.2, py + cr.cy * R - cr.r * R * 0.2, 0,
            px + cr.cx * R, py + cr.cy * R, cr.r * R
          );
          cGrad.addColorStop(0, 'rgba(180,150,130,0.3)');
          cGrad.addColorStop(0.5, 'rgba(80,60,50,0.3)');
          cGrad.addColorStop(1, 'rgba(40,25,20,0.4)');
          ctx.fillStyle = cGrad;
          ctx.beginPath();
          ctx.arc(px + cr.cx * R, py + cr.cy * R, cr.r * R, 0, Math.PI * 2);
          ctx.fill();
        }

        // Rocky ridges
        ctx.strokeStyle = 'rgba(120,90,70,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px - R * 0.4, py - R * 0.1);
        ctx.quadraticCurveTo(px, py - R * 0.3, px + R * 0.35, py + R * 0.05);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px - R * 0.2, py + R * 0.3);
        ctx.quadraticCurveTo(px + R * 0.1, py + R * 0.15, px + R * 0.4, py + R * 0.35);
        ctx.stroke();

        // Shadow (half planet in darkness)
        const shadowGrad = ctx.createLinearGradient(px - R * 0.3, py - R, px + R, py + R);
        shadowGrad.addColorStop(0, 'rgba(0,0,0,0)');
        shadowGrad.addColorStop(0.45, 'rgba(0,0,0,0.1)');
        shadowGrad.addColorStop(1, 'rgba(0,0,0,0.65)');
        ctx.fillStyle = shadowGrad;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);

        // Reddish ambient glow at edge
        const redRim = ctx.createRadialGradient(px, py, R * 0.8, px, py, R);
        redRim.addColorStop(0, 'rgba(0,0,0,0)');
        redRim.addColorStop(1, 'rgba(200,80,40,0.25)');
        ctx.fillStyle = redRim;
        ctx.fillRect(px - R, py - R, R * 2, R * 2);
      }

      // Spherical shading (shared for all)
      const sphereShade = ctx.createRadialGradient(px - R * 0.3, py - R * 0.3, R * 0.05, px, py, R);
      sphereShade.addColorStop(0, 'rgba(255,255,255,0.15)');
      sphereShade.addColorStop(0.4, 'rgba(255,255,255,0)');
      sphereShade.addColorStop(1, 'rgba(0,0,0,0.2)');
      ctx.fillStyle = sphereShade;
      ctx.beginPath();
      ctx.arc(px, py, R, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore(); // end clip

      // Planet outline
      ctx.strokeStyle = colors.light;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(px, py, R, 0, Math.PI * 2);
      ctx.stroke();

      // Selection ring
      if (g.selectedPlanetIds.has(p.id)) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius + 6, 0, Math.PI * 2);
        ctx.stroke();
      }

      // HP bar
      const barW = 50;
      const barH = 5;
      const barX = p.x - barW / 2;
      const barY = p.y - p.radius - 15;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(barX, barY, barW, barH);
      const hpRatio = Math.max(0, p.hp / p.maxHp);
      ctx.fillStyle = hpRatio > 0.5 ? '#44ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff4444';
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);

      // Level text
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`Lv${p.level}`, p.x, p.y);

      // Production icon below planet
      if (p.owner !== 0) {
        ctx.font = '10px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText(p.owner === 2 ? ENEMY_UNIT_NAMES[p.productionType] : UNIT_STATS[p.productionType].name, p.x, p.y + p.radius + 12);

        // Production progress gauge
        const pStats = UNIT_STATS[p.productionType];
        const reduction = Math.min(0.9, 0.1 * (p.level - 1));
        const adjSpawnTime = pStats.spawnTime * (1 - reduction);
        const progress = Math.min(1, p.spawnTimer / adjSpawnTime);
        const pgW = 36;
        const pgH = 4;
        const pgX = p.x - pgW / 2;
        const pgY = p.y + p.radius + 19;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(pgX, pgY, pgW, pgH);
        ctx.fillStyle = colors.light;
        ctx.fillRect(pgX, pgY, pgW * progress, pgH);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(pgX, pgY, pgW, pgH);
      }
    }

    // Units
    for (const u of g.units) {
      const sx = u.x - cam.x;
      const sy = u.y - cam.y;
      if (sx < -20 || sx > viewW + 20 || sy < -20 || sy > viewH + 20) continue;

      const colors = FACTION_COLORS[u.owner];
      const stats = UNIT_STATS[u.type];
      const r = stats.radius;
      const selected = g.selectedUnitIds.has(u.id);

      ctx.fillStyle = colors.main;
      ctx.strokeStyle = selected ? '#ffffff' : colors.light;
      ctx.lineWidth = selected ? 2 : 1;

      const anim = u.attackAnim || 0;

      // ===================== ZERG-STYLE ENEMY UNITS =====================
      if (u.owner === 2) {
        const angle = (u.vx !== 0 || u.vy !== 0) ? Math.atan2(u.vy, u.vx) : (u.attackAngle || 0);
        const t = performance.now() * 0.001;

        if (u.type === 1) {
          // === Baneling-style: round spiky body, orange glowing core, front claws, trailing tentacles ===
          const lunge = anim > 0.5 ? (anim - 0.5) * 2 * 5 : 0;
          ctx.save();
          ctx.translate(u.x + Math.cos(angle) * lunge, u.y + Math.sin(angle) * lunge);
          ctx.rotate(angle);

          // Trailing tentacles (2-3 wisps behind)
          ctx.strokeStyle = '#4a2050';
          ctx.lineWidth = 1.2;
          for (let i = 0; i < 3; i++) {
            const tw = Math.sin(t * 6 + i * 2.1) * r * 0.25;
            const tw2 = Math.sin(t * 5 + i * 1.7) * r * 0.15;
            ctx.beginPath();
            ctx.moveTo(-r * 0.6, (i - 1) * r * 0.2);
            ctx.quadraticCurveTo(-r * 1.0, (i - 1) * r * 0.2 + tw, -r * 1.4 - i * r * 0.15, (i - 1) * r * 0.25 + tw2);
            ctx.stroke();
          }

          // Legs/claws (3 pairs, scythe-like)
          ctx.fillStyle = '#5a3040';
          ctx.strokeStyle = '#3a1a28';
          ctx.lineWidth = 1;
          for (let i = -1; i <= 1; i++) {
            const legWiggle = Math.sin(t * 10 + i * 2) * 0.15;
            // Top claws
            ctx.beginPath();
            ctx.moveTo(i * r * 0.3, -r * 0.4);
            ctx.quadraticCurveTo(i * r * 0.3 - r * 0.2, -r * 0.8 + legWiggle * r, i * r * 0.3 + r * 0.1, -r * 0.9 + legWiggle * r);
            ctx.lineTo(i * r * 0.3, -r * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // Bottom claws
            ctx.beginPath();
            ctx.moveTo(i * r * 0.3, r * 0.4);
            ctx.quadraticCurveTo(i * r * 0.3 - r * 0.2, r * 0.8 - legWiggle * r, i * r * 0.3 + r * 0.1, r * 0.9 - legWiggle * r);
            ctx.lineTo(i * r * 0.3, r * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
          }

          // Spikes radiating from body
          ctx.fillStyle = '#3a2030';
          const spikeCount = 7;
          for (let i = 0; i < spikeCount; i++) {
            const sa = (Math.PI * 0.4) + (Math.PI * 1.2 / spikeCount) * i;
            const sLen = r * (0.4 + Math.sin(i * 1.7) * 0.15);
            ctx.save();
            ctx.rotate(sa - Math.PI * 0.5);
            ctx.beginPath();
            ctx.moveTo(-r * 0.08, -r * 0.35);
            ctx.lineTo(0, -r * 0.35 - sLen);
            ctx.lineTo(r * 0.08, -r * 0.35);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }

          // Main body (round, bulbous)
          ctx.fillStyle = '#8a3050';
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
          ctx.fill();

          // Carapace dark overlay
          ctx.fillStyle = '#6a2540';
          ctx.beginPath();
          ctx.ellipse(-r * 0.1, 0, r * 0.5, r * 0.55, 0, Math.PI * 0.7, Math.PI * 2.3);
          ctx.fill();

          // Glowing orange core (pulsing)
          const corePulse = 0.7 + Math.sin(t * 4) * 0.15 + (anim > 0 ? anim * 0.3 : 0);
          const coreGrad = ctx.createRadialGradient(r * 0.05, 0, 0, r * 0.05, 0, r * 0.4);
          coreGrad.addColorStop(0, `rgba(255,200,50,${corePulse})`);
          coreGrad.addColorStop(0.4, `rgba(255,140,30,${corePulse * 0.7})`);
          coreGrad.addColorStop(1, 'rgba(200,60,20,0)');
          ctx.fillStyle = coreGrad;
          ctx.beginPath();
          ctx.arc(r * 0.05, 0, r * 0.4, 0, Math.PI * 2);
          ctx.fill();

          // Core bright center
          ctx.fillStyle = `rgba(255,230,150,${corePulse * 0.8})`;
          ctx.beginPath();
          ctx.arc(r * 0.05, 0, r * 0.15, 0, Math.PI * 2);
          ctx.fill();

          // Front mandibles/claws (snap on attack)
          const clawOpen = anim > 0.5 ? 0.2 + (anim - 0.5) * 2 * 0.4 : 0.2;
          ctx.fillStyle = '#5a2838';
          ctx.strokeStyle = '#3a1520';
          ctx.lineWidth = 1;
          // Upper claw
          ctx.beginPath();
          ctx.moveTo(r * 0.45, -r * 0.1);
          ctx.quadraticCurveTo(r * 0.9, -r * clawOpen * 1.5, r * 1.1, -r * clawOpen * 0.5);
          ctx.lineTo(r * 0.8, -r * 0.05);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          // Lower claw
          ctx.beginPath();
          ctx.moveTo(r * 0.45, r * 0.1);
          ctx.quadraticCurveTo(r * 0.9, r * clawOpen * 1.5, r * 1.1, r * clawOpen * 0.5);
          ctx.lineTo(r * 0.8, r * 0.05);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          // Head/face
          ctx.fillStyle = '#7a2845';
          ctx.beginPath();
          ctx.ellipse(r * 0.45, 0, r * 0.2, r * 0.18, 0, 0, Math.PI * 2);
          ctx.fill();

          // Eyes (yellow glow)
          const eyeGlow = anim > 0 ? 1 : 0.6;
          ctx.fillStyle = `rgba(255,210,50,${eyeGlow})`;
          ctx.beginPath();
          ctx.arc(r * 0.5, -r * 0.08, r * 0.06, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(r * 0.5, r * 0.08, r * 0.06, 0, Math.PI * 2);
          ctx.fill();

          // Explosion/acid burst on attack
          if (anim > 0.5) {
            const burst = (anim - 0.5) * 2;
            ctx.fillStyle = `rgba(255,180,30,${burst * 0.6})`;
            ctx.beginPath();
            ctx.arc(r * 1.0, 0, r * 0.5 * burst, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = `rgba(120,255,50,${burst * 0.4})`;
            ctx.beginPath();
            ctx.arc(r * 1.0, 0, r * 0.3 * burst, 0, Math.PI * 2);
            ctx.fill();
          }

          if (selected) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();

        } else if (u.type === 2) {
          // === Hydralisk-style: long serpentine body, large scythe claws, purple hood/wings, pustules ===
          const moveAngle = (u.vx !== 0 || u.vy !== 0) ? Math.atan2(u.vy, u.vx) : (u.attackAngle || 0);
          const strikeF = anim > 0.5 ? (anim - 0.5) * 2 : 0;

          ctx.save();
          ctx.translate(u.x, u.y);
          ctx.rotate(moveAngle);

          // Tail/body segments (serpentine wave)
          for (let i = 4; i >= 1; i--) {
            const wave = Math.sin(t * 7 + i * 1.4) * r * 0.12;
            const segR = r * (0.3 - i * 0.03);
            ctx.fillStyle = i % 2 === 0 ? '#8a2858' : '#7a2050';
            ctx.beginPath();
            ctx.ellipse(-r * 0.3 * i, wave, r * 0.22, segR, 0, 0, Math.PI * 2);
            ctx.fill();
          }

          // Pustules/eyes along body
          ctx.fillStyle = 'rgba(200,150,100,0.5)';
          for (let i = 1; i <= 3; i++) {
            const pw = Math.sin(t * 7 + i * 1.4) * r * 0.12;
            ctx.beginPath();
            ctx.arc(-r * 0.3 * i + r * 0.05, pw + r * 0.15, r * 0.06, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-r * 0.3 * i + r * 0.05, pw - r * 0.15, r * 0.06, 0, Math.PI * 2);
            ctx.fill();
          }

          // Main thorax
          ctx.fillStyle = '#9a3060';
          ctx.beginPath();
          ctx.ellipse(0, 0, r * 0.55, r * 0.45, 0, 0, Math.PI * 2);
          ctx.fill();

          // Carapace bumpy texture
          ctx.fillStyle = '#aa3868';
          ctx.beginPath();
          ctx.ellipse(r * 0.05, -r * 0.05, r * 0.35, r * 0.25, -0.2, 0, Math.PI * 2);
          ctx.fill();

          // Purple hood/wings (large, extending upward & backward)
          ctx.fillStyle = '#7a30a0';
          // Upper wing
          ctx.beginPath();
          ctx.moveTo(r * 0.1, -r * 0.35);
          ctx.quadraticCurveTo(-r * 0.3, -r * 1.1, -r * 0.9, -r * 0.8);
          ctx.quadraticCurveTo(-r * 0.5, -r * 0.5, -r * 0.1, -r * 0.35);
          ctx.closePath();
          ctx.fill();
          // Lower wing
          ctx.beginPath();
          ctx.moveTo(r * 0.1, r * 0.35);
          ctx.quadraticCurveTo(-r * 0.3, r * 1.1, -r * 0.9, r * 0.8);
          ctx.quadraticCurveTo(-r * 0.5, r * 0.5, -r * 0.1, r * 0.35);
          ctx.closePath();
          ctx.fill();

          // Wing membrane veins
          ctx.strokeStyle = 'rgba(120,40,160,0.5)';
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.moveTo(0, -r * 0.4);
          ctx.quadraticCurveTo(-r * 0.4, -r * 0.9, -r * 0.7, -r * 0.75);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, r * 0.4);
          ctx.quadraticCurveTo(-r * 0.4, r * 0.9, -r * 0.7, r * 0.75);
          ctx.stroke();

          // Head
          ctx.fillStyle = '#8a2850';
          ctx.beginPath();
          ctx.ellipse(r * 0.45, 0, r * 0.22, r * 0.2, 0, 0, Math.PI * 2);
          ctx.fill();

          // Scythe claws (large, curving inward — slash on attack)
          const slashAngle = anim > 0.3 ? (anim - 0.3) * 1.43 * 0.5 : 0;
          ctx.fillStyle = '#b8a080';
          ctx.strokeStyle = '#8a6850';
          ctx.lineWidth = 1;
          // Upper scythe
          ctx.save();
          ctx.rotate(-slashAngle);
          ctx.beginPath();
          ctx.moveTo(r * 0.35, -r * 0.2);
          ctx.quadraticCurveTo(r * 0.8, -r * 0.7, r * 1.2, -r * 0.3);
          ctx.quadraticCurveTo(r * 1.0, -r * 0.15, r * 0.7, -r * 0.1);
          ctx.lineTo(r * 0.35, -r * 0.12);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.restore();
          // Lower scythe
          ctx.save();
          ctx.rotate(slashAngle);
          ctx.beginPath();
          ctx.moveTo(r * 0.35, r * 0.2);
          ctx.quadraticCurveTo(r * 0.8, r * 0.7, r * 1.2, r * 0.3);
          ctx.quadraticCurveTo(r * 1.0, r * 0.15, r * 0.7, r * 0.1);
          ctx.lineTo(r * 0.35, r * 0.12);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.restore();

          // Fangs
          ctx.fillStyle = '#ddccaa';
          ctx.beginPath();
          ctx.moveTo(r * 0.55, -r * 0.08);
          ctx.lineTo(r * 0.75, -r * 0.15);
          ctx.lineTo(r * 0.6, 0);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(r * 0.55, r * 0.08);
          ctx.lineTo(r * 0.75, r * 0.15);
          ctx.lineTo(r * 0.6, 0);
          ctx.closePath();
          ctx.fill();

          // Eyes (yellow-green)
          const eyeGlow = anim > 0 ? 1 : 0.7;
          ctx.fillStyle = `rgba(220,200,40,${eyeGlow})`;
          ctx.beginPath();
          ctx.arc(r * 0.5, -r * 0.1, r * 0.05, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(r * 0.5, r * 0.1, r * 0.05, 0, Math.PI * 2);
          ctx.fill();

          // Acid spit / slash effect on attack
          if (anim > 0.4) {
            const af = (anim - 0.4) * 1.67;
            // Slash arc
            ctx.strokeStyle = `rgba(180,255,80,${af * 0.8})`;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(r * 0.8, 0, r * 0.6, -Math.PI * 0.4 * af, Math.PI * 0.4 * af);
            ctx.stroke();
            // Green acid drip
            ctx.fillStyle = `rgba(100,255,60,${af * 0.5})`;
            ctx.beginPath();
            ctx.arc(r * 1.1, 0, r * 0.15 * af, 0, Math.PI * 2);
            ctx.fill();
          }

          if (selected) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.ellipse(0, 0, r * 0.8, r * 0.6, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();

        } else {
          // === Ultralisk-style: massive armored beast, brown carapace, purple sacs, huge front claws, back spikes ===
          const angle2 = (u.vx !== 0 || u.vy !== 0) ? Math.atan2(u.vy, u.vx) : (u.attackAngle || 0);
          const smash = anim > 0.5 ? (anim - 0.5) * 2 * 4 : 0;

          ctx.save();
          ctx.translate(u.x, u.y);
          ctx.rotate(angle2);

          // Ground shockwave on attack
          if (anim > 0) {
            const shockR = r * (1.3 + anim * 1.2);
            ctx.strokeStyle = `rgba(200,100,255,${anim * 0.3})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, shockR, 0, Math.PI * 2);
            ctx.stroke();
          }

          // Heavy legs (3 pairs, thick jointed)
          const legPhase = t * 3.5;
          ctx.fillStyle = '#6a4530';
          ctx.strokeStyle = '#4a2a18';
          ctx.lineWidth = 1;
          for (let i = -1; i <= 1; i++) {
            const lx = i * r * 0.4;
            const legMove = Math.sin(legPhase + i * 1.5) * r * 0.06;
            // Upper legs
            ctx.beginPath();
            ctx.moveTo(lx, -r * 0.55);
            ctx.lineTo(lx - r * 0.1, -r * 0.85 + legMove);
            ctx.lineTo(lx - r * 0.2, -r * 1.0 + legMove);
            ctx.lineTo(lx + r * 0.05, -r * 0.9 + legMove);
            ctx.lineTo(lx + r * 0.1, -r * 0.6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            // Lower legs
            ctx.beginPath();
            ctx.moveTo(lx, r * 0.55);
            ctx.lineTo(lx - r * 0.1, r * 0.85 - legMove);
            ctx.lineTo(lx - r * 0.2, r * 1.0 - legMove);
            ctx.lineTo(lx + r * 0.05, r * 0.9 - legMove);
            ctx.lineTo(lx + r * 0.1, r * 0.6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
          }

          // Main body (massive, elongated)
          ctx.fillStyle = '#8a6540';
          ctx.beginPath();
          ctx.ellipse(0, 0, r * 0.95, r * 0.6, 0, 0, Math.PI * 2);
          ctx.fill();

          // Brown carapace armor plates
          ctx.fillStyle = '#9a7550';
          ctx.beginPath();
          ctx.ellipse(-r * 0.15, 0, r * 0.75, r * 0.55, 0, 0, Math.PI * 2);
          ctx.fill();
          // Carapace ridge lines
          ctx.strokeStyle = 'rgba(120,80,40,0.4)';
          ctx.lineWidth = 0.8;
          for (let i = -2; i <= 1; i++) {
            ctx.beginPath();
            ctx.ellipse(i * r * 0.2, 0, r * 0.08, r * 0.52, 0, 0, Math.PI * 2);
            ctx.stroke();
          }

          // Purple energy sacs (glowing, on back)
          const sacPulse = 0.6 + Math.sin(t * 3) * 0.2 + (anim > 0 ? anim * 0.2 : 0);
          const sacPositions = [
            { x: -r * 0.35, y: -r * 0.25, s: r * 0.18 },
            { x: -r * 0.1, y: -r * 0.35, s: r * 0.22 },
            { x: -r * 0.5, y: 0, s: r * 0.15 },
            { x: -r * 0.15, y: r * 0.3, s: r * 0.2 },
            { x: -r * 0.4, y: r * 0.2, s: r * 0.14 },
            { x: 0.05 * r, y: -r * 0.15, s: r * 0.12 },
          ];
          for (const sac of sacPositions) {
            const sacGrad = ctx.createRadialGradient(sac.x, sac.y, 0, sac.x, sac.y, sac.s);
            sacGrad.addColorStop(0, `rgba(200,120,255,${sacPulse})`);
            sacGrad.addColorStop(0.6, `rgba(140,50,200,${sacPulse * 0.6})`);
            sacGrad.addColorStop(1, 'rgba(80,20,120,0)');
            ctx.fillStyle = sacGrad;
            ctx.beginPath();
            ctx.arc(sac.x, sac.y, sac.s, 0, Math.PI * 2);
            ctx.fill();
          }

          // Green pustule dots on sacs
          ctx.fillStyle = `rgba(180,220,80,${sacPulse * 0.7})`;
          ctx.beginPath();
          ctx.arc(-r * 0.1, -r * 0.33, r * 0.05, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(-r * 0.35, -r * 0.2, r * 0.04, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(-r * 0.15, r * 0.28, r * 0.04, 0, Math.PI * 2);
          ctx.fill();

          // Back spikes (large, horn-like)
          ctx.fillStyle = '#5a3a20';
          ctx.strokeStyle = '#3a2010';
          ctx.lineWidth = 0.8;
          const spikes = [
            { x: -r * 0.5, a: -2.2, l: r * 0.55 },
            { x: -r * 0.3, a: -2.0, l: r * 0.7 },
            { x: -r * 0.1, a: -1.8, l: r * 0.6 },
            { x: 0.1 * r, a: -1.6, l: r * 0.45 },
            { x: -r * 0.5, a: 2.2, l: r * 0.5 },
            { x: -r * 0.3, a: 2.0, l: r * 0.65 },
            { x: -r * 0.1, a: 1.8, l: r * 0.55 },
            { x: 0.1 * r, a: 1.6, l: r * 0.4 },
          ];
          for (const sp of spikes) {
            const tipX = sp.x + Math.cos(sp.a) * sp.l;
            const tipY = Math.sin(sp.a) * sp.l;
            ctx.beginPath();
            ctx.moveTo(sp.x - r * 0.05, Math.sin(sp.a) * r * 0.15);
            ctx.lineTo(tipX, tipY);
            ctx.lineTo(sp.x + r * 0.05, Math.sin(sp.a) * r * 0.1);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
          }

          // Head (front, smaller, with mouth)
          ctx.fillStyle = '#7a5535';
          ctx.beginPath();
          ctx.ellipse(r * 0.65, 0, r * 0.35, r * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();

          // Facial ridges
          ctx.strokeStyle = 'rgba(100,60,30,0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.arc(r * 0.65, 0, r * 0.2, -1.2, 1.2);
          ctx.stroke();

          // Massive front claws/tusks (swing on attack)
          const clawSwing = anim > 0.3 ? (anim - 0.3) * 1.43 * 0.5 : 0;
          ctx.fillStyle = '#b89870';
          ctx.strokeStyle = '#7a5a30';
          ctx.lineWidth = 1.2;
          // Upper claw
          ctx.save();
          ctx.rotate(-clawSwing);
          ctx.beginPath();
          ctx.moveTo(r * 0.55, -r * 0.25);
          ctx.quadraticCurveTo(r * 1.2, -r * 0.7, r * 1.5 + smash, -r * 0.15);
          ctx.quadraticCurveTo(r * 1.3 + smash * 0.5, -r * 0.05, r * 0.8, -r * 0.08);
          ctx.lineTo(r * 0.55, -r * 0.15);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.restore();
          // Lower claw
          ctx.save();
          ctx.rotate(clawSwing);
          ctx.beginPath();
          ctx.moveTo(r * 0.55, r * 0.25);
          ctx.quadraticCurveTo(r * 1.2, r * 0.7, r * 1.5 + smash, r * 0.15);
          ctx.quadraticCurveTo(r * 1.3 + smash * 0.5, r * 0.05, r * 0.8, r * 0.08);
          ctx.lineTo(r * 0.55, r * 0.15);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.restore();

          // Mouth tusks (smaller inner fangs)
          ctx.fillStyle = '#d4c4a0';
          ctx.beginPath();
          ctx.moveTo(r * 0.8, -r * 0.1);
          ctx.lineTo(r * 1.0, -r * 0.18);
          ctx.lineTo(r * 0.88, -r * 0.02);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(r * 0.8, r * 0.1);
          ctx.lineTo(r * 1.0, r * 0.18);
          ctx.lineTo(r * 0.88, r * 0.02);
          ctx.closePath();
          ctx.fill();

          // Eyes (pinkish-red glow)
          const eyeGlow = anim > 0 ? 1 : 0.6;
          ctx.fillStyle = `rgba(255,80,120,${eyeGlow})`;
          ctx.beginPath();
          ctx.arc(r * 0.72, -r * 0.12, r * 0.06, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(r * 0.72, r * 0.12, r * 0.06, 0, Math.PI * 2);
          ctx.fill();

          // Impact shockwave + purple energy burst on attack
          if (anim > 0.6) {
            const shk = (anim - 0.6) * 2.5;
            ctx.strokeStyle = `rgba(180,80,255,${shk * 0.7})`;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(r * 1.3, 0, r * 0.7 * shk, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = `rgba(200,120,255,${shk * 0.3})`;
            ctx.beginPath();
            ctx.arc(r * 1.3, 0, r * 0.4 * shk, 0, Math.PI * 2);
            ctx.fill();
          }

          if (selected) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(0, 0, r * 1.15, r * 0.75, 0, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }

      // ===================== PLAYER / ALLIED UNITS (IMAGE-BASED) =====================
      } else {
        const angle = Math.atan2(u.vy, u.vx) || 0;
        const isMoving = Math.abs(u.vx) > 1 || Math.abs(u.vy) > 1;
        const thrustOffset = anim > 0.5 ? (anim - 0.5) * 2 * 4 : 0;
        const recoil = anim > 0.5 ? (anim - 0.5) * 2 * 2 : 0;

        ctx.save();

        // Interceptor: push forward on attack. Others: recoil back.
        if (u.type === 1) {
          ctx.translate(u.x + Math.cos(angle) * thrustOffset, u.y + Math.sin(angle) * thrustOffset);
        } else {
          ctx.translate(u.x - Math.cos(angle) * recoil, u.y - Math.sin(angle) * recoil);
        }

        // Rotation per image orientation:
        // Type 1 (r요격기.jpg): nose UP → angle + PI/2
        // Type 2 (r구축함.jpg): nose LEFT → angle + PI
        // Type 3 (r전함.jpg): nose LEFT → angle + PI
        const rotOffset = u.type === 1 ? Math.PI / 2 : Math.PI;
        ctx.rotate(angle + rotOffset);

        // Image sizing: maintain aspect ratio from loaded image
        const img = SHIP_IMAGES[u.type];
        const baseScale = u.type === 1 ? 3.5 : u.type === 2 ? 4.0 : 4.5;
        const maxDim = r * baseScale;
        let drawW, drawH;
        if (img && img.naturalWidth > 0 && img.naturalHeight > 0) {
          const ar = img.naturalWidth / img.naturalHeight;
          if (ar >= 1) { drawW = maxDim; drawH = maxDim / ar; }
          else { drawH = maxDim; drawW = maxDim * ar; }
        } else {
          drawW = maxDim; drawH = maxDim;
        }

        // Engine exhaust flames (only when moving)
        if (isMoving) {
          const t = performance.now() * 0.001;
          const flickerA = 0.5 + Math.sin(t * 14 + u.x * 0.1) * 0.2;
          const flickerLen = 0.7 + Math.sin(t * 11 + u.y * 0.1) * 0.2;

          if (u.type === 1) {
            // 요격기 (nose UP): engines at bottom → flames extend in +Y direction
            for (let side = -1; side <= 1; side += 2) {
              const exX = side * drawW * 0.28;
              const exY = drawH * 0.45;
              const flameLen = drawH * 0.35 * flickerLen;
              const flameGrad = ctx.createLinearGradient(exX, exY, exX, exY + flameLen);
              flameGrad.addColorStop(0, `rgba(200,220,255,${flickerA * 0.9})`);
              flameGrad.addColorStop(0.3, `rgba(100,180,255,${flickerA * 0.7})`);
              flameGrad.addColorStop(0.7, `rgba(60,120,200,${flickerA * 0.3})`);
              flameGrad.addColorStop(1, 'rgba(30,60,150,0)');
              ctx.fillStyle = flameGrad;
              ctx.beginPath();
              ctx.moveTo(exX - drawW * 0.07, exY);
              ctx.lineTo(exX, exY + flameLen);
              ctx.lineTo(exX + drawW * 0.07, exY);
              ctx.closePath();
              ctx.fill();
              ctx.fillStyle = `rgba(220,240,255,${flickerA * 0.8})`;
              ctx.beginPath();
              ctx.arc(exX, exY + flameLen * 0.12, drawW * 0.03, 0, Math.PI * 2);
              ctx.fill();
            }
          } else if (u.type === 2) {
            // 구축함 (nose LEFT): engines at right → flames extend in +X direction
            for (let side = -1; side <= 1; side += 2) {
              const exY = side * drawH * 0.28;
              const exX = drawW * 0.45;
              const flameLen = drawW * 0.30 * flickerLen;
              const flameGrad = ctx.createLinearGradient(exX, exY, exX + flameLen, exY);
              flameGrad.addColorStop(0, `rgba(220,230,255,${flickerA * 0.85})`);
              flameGrad.addColorStop(0.3, `rgba(100,170,255,${flickerA * 0.6})`);
              flameGrad.addColorStop(0.7, `rgba(50,100,200,${flickerA * 0.25})`);
              flameGrad.addColorStop(1, 'rgba(20,50,130,0)');
              ctx.fillStyle = flameGrad;
              ctx.beginPath();
              ctx.moveTo(exX, exY - drawH * 0.08);
              ctx.lineTo(exX + flameLen, exY);
              ctx.lineTo(exX, exY + drawH * 0.08);
              ctx.closePath();
              ctx.fill();
            }
          } else {
            // 전함 (nose LEFT): 5 engines at right → flames extend in +X direction
            const engineCount = 5;
            const spacing = drawH * 0.14;
            const startY = -(engineCount - 1) * spacing / 2;
            for (let i = 0; i < engineCount; i++) {
              const exY = startY + i * spacing;
              const exX = drawW * 0.44;
              const flameLen = drawW * 0.22 * flickerLen;
              const flameGrad = ctx.createLinearGradient(exX, exY, exX + flameLen, exY);
              flameGrad.addColorStop(0, `rgba(230,235,255,${flickerA * 0.8})`);
              flameGrad.addColorStop(0.3, `rgba(120,180,255,${flickerA * 0.55})`);
              flameGrad.addColorStop(0.7, `rgba(60,100,200,${flickerA * 0.2})`);
              flameGrad.addColorStop(1, 'rgba(20,40,120,0)');
              ctx.fillStyle = flameGrad;
              ctx.beginPath();
              ctx.moveTo(exX, exY - drawH * 0.04);
              ctx.lineTo(exX + flameLen, exY);
              ctx.lineTo(exX, exY + drawH * 0.04);
              ctx.closePath();
              ctx.fill();
            }
          }
        }

        // Draw the ship image with source clipping to hide baked-in engine flames
        if (SHIP_IMG_LOADED[u.type] && img) {
          const nw = img.naturalWidth;
          const nh = img.naturalHeight;
          if (u.type === 1) {
            // 요격기: clip bottom ~18% (baked engine flames)
            const clipH = nh * 0.82;
            const dH = drawH * 0.82;
            ctx.drawImage(img, 0, 0, nw, clipH, -drawW / 2, -dH / 2 - (drawH - dH) * 0.1, drawW, dH);
          } else if (u.type === 3) {
            // 전함: clip right ~12% (baked engine flames)
            const clipW = nw * 0.88;
            const dW = drawW * 0.88;
            ctx.drawImage(img, 0, 0, clipW, nh, -dW / 2 - (drawW - dW) * 0.1, -drawH / 2, dW, drawH);
          } else {
            // 구축함: draw full image (no prominent baked flames)
            ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
          }
        } else {
          ctx.fillStyle = colors.main;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
        }

        // Selection ring
        if (selected) {
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Muzzle flash on attack
        if (anim > 0.5) {
          const fi = (anim - 0.5) * 2;
          let flashX = 0, flashY = 0;
          if (u.type === 1) {
            // 요격기 (nose UP): forward = -Y
            flashY = -drawH * 0.5;
          } else {
            // 구축함/전함 (nose LEFT): forward = -X
            flashX = -drawW * 0.5;
          }
          ctx.fillStyle = `rgba(140,210,255,${fi * 0.9})`;
          ctx.beginPath();
          ctx.arc(flashX, flashY, r * 0.6 * fi, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = `rgba(220,240,255,${fi * 0.7})`;
          ctx.beginPath();
          ctx.arc(flashX, flashY, r * 0.3 * fi, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      // Unit HP bar (only if damaged)
      if (u.hp < u.maxHp) {
        const bw = r * 2.5;
        const bh = 3;
        const bx = u.x - bw / 2;
        const by = u.y - r - 6;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx, by, bw, bh);
        const hpR = u.hp / u.maxHp;
        ctx.fillStyle = hpR > 0.5 ? '#44ff44' : '#ff4444';
        ctx.fillRect(bx, by, bw * hpR, bh);
      }
    }

    // Selection box
    if (g.mouse.isDragging && g.mouse.button === 0) {
      const wx1 = g.mouse.dragSX / cam.zoom + cam.x;
      const wy1 = g.mouse.dragSY / cam.zoom + cam.y;
      const wx2 = g.mouse.x / cam.zoom + cam.x;
      const wy2 = g.mouse.y / cam.zoom + cam.y;
      // Only draw if we started dragging on the main canvas (not minimap)
      if (!g.isMinimapDragging) {
        ctx.strokeStyle = 'rgba(0,255,0,0.8)';
        ctx.lineWidth = 1;
        ctx.fillStyle = 'rgba(0,255,0,0.1)';
        const x = Math.min(wx1, wx2);
        const y = Math.min(wy1, wy2);
        const w = Math.abs(wx2 - wx1);
        const h = Math.abs(wy2 - wy1);
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);
      }
    }

    ctx.restore();

    // ---- Minimap ----
    drawMinimap(ctx, g, W, H);
  }

  function drawMinimap(ctx, g, W, H) {
    const mmX = W - MM_W - MM_MARGIN;
    const mmY = H - MM_H - MM_MARGIN;
    const scaleX = MM_W / MAP_W;
    const scaleY = MM_H / MAP_H;

    // Background
    ctx.fillStyle = 'rgba(0,0,20,0.85)';
    ctx.fillRect(mmX, mmY, MM_W, MM_H);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(mmX, mmY, MM_W, MM_H);

    // Planets on minimap
    for (const p of g.planets) {
      const px = mmX + p.x * scaleX;
      const py = mmY + p.y * scaleY;
      ctx.fillStyle = FACTION_COLORS[p.owner].main;
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Units on minimap (as small dots)
    for (const u of g.units) {
      const px = mmX + u.x * scaleX;
      const py = mmY + u.y * scaleY;
      ctx.fillStyle = FACTION_COLORS[u.owner].main;
      ctx.fillRect(px - 1, py - 1, 2, 2);
    }

    // Camera viewport rectangle
    const vx = mmX + g.camera.x * scaleX;
    const vy = mmY + g.camera.y * scaleY;
    const vw = (g.camera.w / g.camera.zoom) * scaleX;
    const vh = (g.camera.h / g.camera.zoom) * scaleY;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(vx, vy, vw, vh);
  }

  // ==================== INPUT HANDLERS ====================
  function isOnMinimap(sx, sy) {
    const canvas = canvasRef.current;
    if (!canvas) return false;
    const mmX = canvas.width - MM_W - MM_MARGIN;
    const mmY = canvas.height - MM_H - MM_MARGIN;
    return sx >= mmX && sx <= mmX + MM_W && sy >= mmY && sy <= mmY + MM_H;
  }

  function minimapToWorld(sx, sy) {
    const canvas = canvasRef.current;
    const mmX = canvas.width - MM_W - MM_MARGIN;
    const mmY = canvas.height - MM_H - MM_MARGIN;
    const wx = ((sx - mmX) / MM_W) * MAP_W;
    const wy = ((sy - mmY) / MM_H) * MAP_H;
    return { x: clamp(wx, 0, MAP_W), y: clamp(wy, 0, MAP_H) };
  }

  function getPlanetAtWorld(wx, wy, g) {
    for (const p of g.planets) {
      if (dist(wx, wy, p.x, p.y) <= p.radius + 5) return p;
    }
    return null;
  }

  function handleMouseDown(e) {
    const g = G.current;
    if (g.phase !== 'playing') return;

    const sx = e.clientX;
    const sy = e.clientY;
    g.mouse.x = sx;
    g.mouse.y = sy;
    g.mouse.down = true;
    g.mouse.button = e.button;
    g.mouse.dragSX = sx;
    g.mouse.dragSY = sy;
    g.mouse.isDragging = false;

    if (e.button === 0) { // Left click
      if (isOnMinimap(sx, sy)) {
        g.isMinimapDragging = true;
        const wp = minimapToWorld(sx, sy);
        const viewW = g.camera.w / g.camera.zoom;
        const viewH = g.camera.h / g.camera.zoom;
        g.camera.x = clamp(wp.x - viewW / 2, 0, MAP_W - viewW);
        g.camera.y = clamp(wp.y - viewH / 2, 0, MAP_H - viewH);
        return;
      }

      const wx = sx / g.camera.zoom + g.camera.x;
      const wy = sy / g.camera.zoom + g.camera.y;
      const clickedPlanet = getPlanetAtWorld(wx, wy, g);

      // Double-click detection
      const now = Date.now();
      if (clickedPlanet && clickedPlanet.owner === 1) {
        if (now - g.lastClickTime < 300 && g.lastClickPlanetId === clickedPlanet.id) {
          // Double click: select all visible friendly planets
          g.selectedPlanetIds.clear();
          g.selectedUnitIds.clear();
          for (const p of g.planets) {
            if (p.owner !== 1) continue;
            const viewW = g.camera.w / g.camera.zoom;
            const viewH = g.camera.h / g.camera.zoom;
            const psx = p.x - g.camera.x;
            const psy = p.y - g.camera.y;
            if (psx >= -50 && psx <= viewW + 50 && psy >= -50 && psy <= viewH + 50) {
              g.selectedPlanetIds.add(p.id);
            }
          }
          g.lastClickTime = 0;
          return;
        }
        g.lastClickTime = now;
        g.lastClickPlanetId = clickedPlanet.id;
      }

      // Single click on planet
      if (clickedPlanet && clickedPlanet.owner === 1) {
        g.selectedUnitIds.clear();
        g.selectedPlanetIds.clear();
        g.selectedPlanetIds.add(clickedPlanet.id);
      } else if (!clickedPlanet) {
        // Starting box drag or deselect
        g.selectedPlanetIds.clear();
      }
    }
  }

  function handleMouseMove(e) {
    const g = G.current;
    if (g.phase !== 'playing') return;

    const canvas = canvasRef.current;
    const cw = canvas ? canvas.width : window.innerWidth;
    const ch = canvas ? canvas.height : window.innerHeight;
    const sx = clamp(e.clientX, 0, cw);
    const sy = clamp(e.clientY, 0, ch);
    g.mouse.x = sx;
    g.mouse.y = sy;

    if (g.mouse.down) {
      const dx = sx - g.mouse.dragSX;
      const dy = sy - g.mouse.dragSY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        g.mouse.isDragging = true;
      }

      if (g.isMinimapDragging) {
        const wp = minimapToWorld(sx, sy);
        const viewW2 = g.camera.w / g.camera.zoom;
        const viewH2 = g.camera.h / g.camera.zoom;
        g.camera.x = clamp(wp.x - viewW2 / 2, 0, Math.max(0, MAP_W - viewW2));
        g.camera.y = clamp(wp.y - viewH2 / 2, 0, Math.max(0, MAP_H - viewH2));
      }
    }
  }

  function handleMouseUp(e) {
    const g = G.current;
    if (g.phase !== 'playing') return;

    if (g.isMinimapDragging) {
      g.isMinimapDragging = false;
      g.mouse.down = false;
      g.mouse.isDragging = false;
      return;
    }

    if (e.button === 0 && g.mouse.isDragging && !g.isMinimapDragging) {
      // Box select units
      const cam = g.camera;
      const x1 = Math.min(g.mouse.dragSX, g.mouse.x) / cam.zoom + cam.x;
      const y1 = Math.min(g.mouse.dragSY, g.mouse.y) / cam.zoom + cam.y;
      const x2 = Math.max(g.mouse.dragSX, g.mouse.x) / cam.zoom + cam.x;
      const y2 = Math.max(g.mouse.dragSY, g.mouse.y) / cam.zoom + cam.y;

      g.selectedUnitIds.clear();
      g.selectedPlanetIds.clear();
      for (const u of g.units) {
        if (u.owner === 1 && u.x >= x1 && u.x <= x2 && u.y >= y1 && u.y <= y2) {
          g.selectedUnitIds.add(u.id);
        }
      }
    }

    g.mouse.down = false;
    g.mouse.isDragging = false;
  }

  function handleRightClick(e) {
    e.preventDefault();
    const g = G.current;
    if (g.phase !== 'playing') return;

    const sx = e.clientX;
    const sy = e.clientY;
    let wx, wy;

    if (isOnMinimap(sx, sy)) {
      const wp = minimapToWorld(sx, sy);
      wx = wp.x;
      wy = wp.y;
    } else {
      wx = sx / g.camera.zoom + g.camera.x;
      wy = sy / g.camera.zoom + g.camera.y;
    }

    const targetPlanet = getPlanetAtWorld(wx, wy, g);

    // If planets are selected => set rally point
    if (g.selectedPlanetIds.size > 0) {
      for (const pid of g.selectedPlanetIds) {
        const p = g.planets.find(pl => pl.id === pid);
        if (!p || p.owner !== 1) continue;
        p.rallyPoint = { x: wx, y: wy };
        p.rallyPointPlanetId = targetPlanet ? targetPlanet.id : null;

        // Immediately dispatch idle units
        for (const u of g.units) {
          if (u.owner === 1 && u.homePlanetId === p.id && u.state === 'IDLE') {
            u.state = 'MOVING';
            u.homePlanetId = null;
            u.targetX = wx;
            u.targetY = wy;
            u.targetPlanetId = targetPlanet ? targetPlanet.id : null;
          }
        }
      }
    }

    // If units are selected => move/attack
    if (g.selectedUnitIds.size > 0) {
      // Spawn move marker particle
      g.particles.push({
        type: 'moveMarker',
        x: wx, y: wy,
        life: 0.8, maxLife: 0.8,
        radius: 20,
      });
      for (const uid of g.selectedUnitIds) {
        const u = g.units.find(unit => unit.id === uid);
        if (!u || u.owner !== 1) continue;
        u.state = 'MOVING';
        u.homePlanetId = null;
        u.targetX = wx;
        u.targetY = wy;
        u.targetPlanetId = targetPlanet ? targetPlanet.id : null;
      }
    }
  }

  function handleKeyDown(e) {
    const g = G.current;
    g.keys.add(e.code);

    // ESC: toggle pause menu
    if (e.code === 'Escape') {
      e.preventDefault();
      if (g.phase === 'playing') {
        g.phase = 'paused';
        setUi(prev => ({ ...prev, phase: 'paused' }));
      } else if (g.phase === 'paused') {
        g.phase = 'playing';
        g.lastFrameTime = performance.now();
        setUi(prev => ({ ...prev, phase: 'playing' }));
      } else if (g.phase === 'help') {
        g.phase = 'paused';
        setUi(prev => ({ ...prev, phase: 'paused' }));
      }
      return;
    }

    if (g.phase !== 'playing') return;

    // F1: Select all player units on screen
    if (e.code === 'F1') {
      e.preventDefault();
      const viewW = g.camera.w / g.camera.zoom;
      const viewH = g.camera.h / g.camera.zoom;
      const left = g.camera.x;
      const top = g.camera.y;
      const right = left + viewW;
      const bottom = top + viewH;
      g.selectedUnitIds.clear();
      g.selectedPlanetIds.clear();
      for (const u of g.units) {
        if (u.owner === 1 && u.hp > 0 && u.x >= left && u.x <= right && u.y >= top && u.y <= bottom) {
          g.selectedUnitIds.add(u.id);
        }
      }
      return;
    }

    // F2: Select all player units in the entire game
    if (e.code === 'F2') {
      e.preventDefault();
      g.selectedUnitIds.clear();
      g.selectedPlanetIds.clear();
      for (const u of g.units) {
        if (u.owner === 1 && u.hp > 0) {
          g.selectedUnitIds.add(u.id);
        }
      }
      return;
    }

    // F3: Select all player planets on screen
    if (e.code === 'F3') {
      e.preventDefault();
      const viewW = g.camera.w / g.camera.zoom;
      const viewH = g.camera.h / g.camera.zoom;
      const left = g.camera.x;
      const top = g.camera.y;
      const right = left + viewW;
      const bottom = top + viewH;
      g.selectedUnitIds.clear();
      g.selectedPlanetIds.clear();
      for (const p of g.planets) {
        if (p.owner === 1 && p.x >= left && p.x <= right && p.y >= top && p.y <= bottom) {
          g.selectedPlanetIds.add(p.id);
        }
      }
      return;
    }

    // F4: Select all player planets in the entire game
    if (e.code === 'F4') {
      e.preventDefault();
      g.selectedUnitIds.clear();
      g.selectedPlanetIds.clear();
      for (const p of g.planets) {
        if (p.owner === 1) {
          g.selectedPlanetIds.add(p.id);
        }
      }
      return;
    }

    const digitMatch = e.code.match(/^Digit([1-4])$/);
    if (digitMatch) {
      const num = parseInt(digitMatch[1]);

      // Control groups: Shift + 1-4 or Ctrl + 1-4 to assign
      if (e.shiftKey || e.ctrlKey) {
        e.preventDefault();
        g.controlGroups[num] = new Set(g.selectedUnitIds);
        return;
      }

      // Control groups: 1-4 to recall
      const group = g.controlGroups[num];
      if (group && group.size > 0) {
        // Filter out dead units
        const alive = new Set();
        for (const id of group) {
          if (g.units.some(u => u.id === id && u.hp > 0)) alive.add(id);
        }
        g.controlGroups[num] = alive;
        if (alive.size > 0) {
          g.selectedUnitIds = new Set(alive);
          g.selectedPlanetIds.clear();
        }
      }
    }
  }

  function handleKeyUp(e) {
    G.current.keys.delete(e.code);
  }

  // ==================== UI ACTIONS ====================
  const changeProduction = useCallback((type) => {
    const g = G.current;
    for (const pid of g.selectedPlanetIds) {
      const p = g.planets.find(pl => pl.id === pid);
      if (p && p.owner === 1) p.productionType = type;
    }
  }, []);

  const upgradePlanets = useCallback(() => {
    const g = G.current;
    for (const pid of g.selectedPlanetIds) {
      const p = g.planets.find(pl => pl.id === pid);
      if (!p || p.owner !== 1 || p.level >= 10) continue;
      const cost = p.level * 50;
      if (g.playerGold >= cost) {
        g.playerGold -= cost;
        const baseHp = p.owner === 0 ? 400 : 1000;
        const hpGain = baseHp * 0.2;
        p.level++;
        p.maxHp = baseHp * (1 + 0.2 * (p.level - 1));
        p.hp = Math.min(p.maxHp, p.hp + hpGain);
      }
    }
  }, []);

  // ==================== SETUP (useEffect) ====================
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const g = G.current;
    g.camera.w = canvas.width;
    g.camera.h = canvas.height;

    const ctx = canvas.getContext('2d');

    // Generate background stars
    g.stars = [];
    for (let i = 0; i < 600; i++) {
      g.stars.push({
        x: Math.random() * (MAP_W + 1000),
        y: Math.random() * (MAP_H + 600),
        size: Math.random() * 2 + 0.5,
        brightness: Math.random() * 0.6 + 0.2,
        color: Math.random() > 0.9 ? '#aaccff' : Math.random() > 0.8 ? '#ffddaa' : '#ffffff',
      });
    }

    // Event listeners
    const onMD = (e) => handleMouseDown(e);
    const onMM = (e) => handleMouseMove(e);
    const onMU = (e) => handleMouseUp(e);
    const onRC = (e) => handleRightClick(e);
    const onKD = (e) => {
      // Capture Ctrl+Digit for control groups before browser handles it
      if (e.ctrlKey && /^Digit[1-4]$/.test(e.code)) {
        e.preventDefault();
        e.stopPropagation();
      }
      handleKeyDown(e);
    };
    const onKU = (e) => handleKeyUp(e);
    const onWheel = (e) => {
      e.preventDefault();
      const g2 = G.current;
      if (g2.phase !== 'playing') return;
      const oldZoom = g2.camera.zoom;
      if (e.deltaY < 0) g2.camera.zoom = Math.min(MAX_ZOOM, oldZoom + ZOOM_STEP);
      else g2.camera.zoom = Math.max(MIN_ZOOM, oldZoom - ZOOM_STEP);
      // Keep center stable
      const cx = g2.camera.x + (g2.camera.w / oldZoom) / 2;
      const cy = g2.camera.y + (g2.camera.h / oldZoom) / 2;
      const newViewW = g2.camera.w / g2.camera.zoom;
      const newViewH = g2.camera.h / g2.camera.zoom;
      g2.camera.x = clamp(cx - newViewW / 2, 0, Math.max(0, MAP_W - newViewW));
      g2.camera.y = clamp(cy - newViewH / 2, 0, Math.max(0, MAP_H - newViewH));
    };
    const onResize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      G.current.camera.w = canvas.width;
      G.current.camera.h = canvas.height;
    };

    canvas.addEventListener('mousedown', onMD);
    window.addEventListener('mousemove', onMM);
    window.addEventListener('mouseup', onMU);
    canvas.addEventListener('contextmenu', onRC);
    canvas.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKD, true);
    window.addEventListener('keyup', onKU);
    window.addEventListener('resize', onResize);

    // Game loop
    g.lastFrameTime = performance.now();

    const gameLoop = (timestamp) => {
      const dt = Math.min((timestamp - g.lastFrameTime) / 1000, 0.05);
      g.lastFrameTime = timestamp;

      if (g.phase === 'playing') {
        update(dt);
      }
      render(ctx);

      animFrameRef.current = requestAnimationFrame(gameLoop);
    };

    animFrameRef.current = requestAnimationFrame(gameLoop);

    return () => {
      cancelAnimationFrame(animFrameRef.current);
      canvas.removeEventListener('mousedown', onMD);
      window.removeEventListener('mousemove', onMM);
      window.removeEventListener('mouseup', onMU);
      canvas.removeEventListener('contextmenu', onRC);
      canvas.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKD, true);
      window.removeEventListener('keyup', onKU);
      window.removeEventListener('resize', onResize);
    };
  }, []);

  // ==================== JSX RENDER ====================
  const selectedPlanetData = ui.selectedPlanets;
  const hasSelectedPlanets = selectedPlanetData.length > 0;
  const upgradeCost = hasSelectedPlanets ? selectedPlanetData[0].level * 50 : 0;
  const currentProdType = hasSelectedPlanets ? selectedPlanetData[0].productionType : 1;

  return (
    <div className="w-screen h-screen relative overflow-hidden select-none" style={{userSelect:'none'}}>
      <canvas ref={canvasRef} className="absolute top-0 left-0 z-0"
        style={{ pointerEvents: (ui.phase === 'paused' || ui.phase === 'help') ? 'none' : 'auto' }} />

      {/* ---- START SCREEN (Stellaris-style) ---- */}
      {ui.phase === 'start' && (
        <div className="absolute inset-0 z-50 overflow-hidden" style={{
          background: 'linear-gradient(175deg, #040810 0%, #0a1628 30%, #0d1f3a 50%, #0a1525 70%, #050a14 100%)',
        }}>

          {/* Star field background */}
          <div className="absolute inset-0 pointer-events-none" style={{ overflow: 'hidden' }}>
            {Array.from({length: 120}, (_, i) => (
              <div key={i} className="absolute rounded-full" style={{
