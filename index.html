                width: Math.random() > 0.9 ? 2 : 1,
                height: Math.random() > 0.9 ? 2 : 1,
                background: `rgba(${180 + Math.random()*75}, ${200 + Math.random()*55}, 255, ${0.2 + Math.random()*0.5})`,
                left: `${Math.random()*100}%`,
                top: `${Math.random()*100}%`,
              }} />
            ))}
          </div>

          {/* Nebula color wash */}
          <div className="absolute inset-0 pointer-events-none" style={{
            background: 'radial-gradient(ellipse at 65% 80%, rgba(20,60,120,0.25) 0%, transparent 50%), radial-gradient(ellipse at 30% 20%, rgba(10,40,80,0.15) 0%, transparent 40%)',
          }} />

          {/* Flying ships (small streaks) */}
          <div className="absolute pointer-events-none" style={{ left: 0, top: '62%', width: '100%', height: 2 }}>
            <div style={{
              position: 'absolute', width: 40, height: 2, top: 0,
              background: 'linear-gradient(90deg, transparent, rgba(80,200,255,0.8), rgba(80,200,255,0.3))',
              animation: 'shipFly 8s linear infinite',
            }} />
          </div>
          <div className="absolute pointer-events-none" style={{ left: 0, top: '65%', width: '100%', height: 1 }}>
            <div style={{
              position: 'absolute', width: 25, height: 1, top: 0,
              background: 'linear-gradient(90deg, transparent, rgba(60,180,255,0.6), rgba(60,180,255,0.2))',
              animation: 'shipFly 10s linear infinite 3s',
            }} />
          </div>
          <div className="absolute pointer-events-none" style={{ left: 0, top: '60%', width: '100%', height: 1 }}>
            <div style={{
              position: 'absolute', width: 30, height: 1, top: 0,
              background: 'linear-gradient(90deg, transparent, rgba(70,190,255,0.7), rgba(70,190,255,0.2))',
              animation: 'shipFly 12s linear infinite 6s',
            }} />
          </div>

          {/* Large planet (bottom right, partially visible) */}
          <div className="absolute" style={{
            width: 'min(700px, 80vw)',
            height: 'min(700px, 80vw)',
            right: '-5%',
            bottom: '-35%',
            borderRadius: '50%',
            background: 'radial-gradient(circle at 35% 35%, #2a4a6a 0%, #1a3050 30%, #0f2035 60%, #080e18 100%)',
            animation: 'planetGlow 6s ease-in-out infinite',
          }}>
            {/* Atmosphere rim */}
            <div className="absolute inset-0 rounded-full" style={{
              background: 'radial-gradient(circle at 30% 30%, transparent 55%, rgba(40,120,200,0.12) 70%, rgba(30,100,180,0.06) 85%, transparent 100%)',
            }} />
            {/* Surface hint */}
            <div className="absolute rounded-full" style={{
              width: '90%', height: '90%', top: '5%', left: '5%',
              background: 'radial-gradient(ellipse at 40% 40%, rgba(60,100,140,0.1) 0%, transparent 50%)',
            }} />
          </div>

          {/* Content area - centered */}
          <div className="absolute inset-0 flex flex-col items-center justify-center" style={{ paddingBottom: '5vh' }}>

            {/* Title block */}
            <div style={{ animation: 'fadeSlideUp 1.5s ease-out' }}>
              {/* Small accent line above title */}
              <div className="mx-auto mb-5" style={{
                width: 50, height: 1,
                background: 'rgba(80,200,160,0.5)',
                boxShadow: '0 0 8px rgba(80,200,160,0.3)',
              }} />

              {/* Main title */}
              <h1 className="text-center" style={{
                fontSize: 'clamp(2.8rem, 7vw, 5.5rem)',
                fontWeight: 300,
                letterSpacing: '0.35em',
                color: '#e0eef8',
                fontFamily: "'Segoe UI', 'Helvetica Neue', Arial, sans-serif",
                textShadow: '0 0 40px rgba(40,120,180,0.15)',
                lineHeight: 1,
              }}>

                    <div className="text-white font-bold">전함 <span className="text-gray-500 text-xs font-normal">(인구 3)</span></div>
                    <div className="text-gray-400 text-xs">HP 320 | 공격력 40 | 속도 40 | 생산시간 14.4초 | 처치 보상 3G</div>
                    <div className="text-orange-400 text-xs mt-1">사거리 내 적 유닛 최대 3기 동시 공격 가능</div>
                    <div className="text-green-400 text-xs">높은 체력과 강력한 공격력의 핵심 전력 유닛</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ---- GAME OVER SCREEN ---- */}
      {ui.phase === 'gameover' && (() => {
        const s = ui.gameStats || { produced:{1:0,2:0,3:0}, kills:{1:0,2:0,3:0}, goldEarned:0, planetsCaptured:0 };
        const isVictory = ui.gameResult === 'victory';
        return (
        <div className="absolute inset-0 flex flex-col items-center justify-center z-50"
             style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(4px)' }}>
          <h1
            style={{ fontSize: 'clamp(3rem, 8vw, 6rem)', fontWeight: 900, marginBottom: 8,
                     color: isVictory ? '#60a5fa' : '#ef4444',
                     textShadow: isVictory ? '0 0 40px rgba(68,153,255,0.8)' : '0 0 40px rgba(255,68,85,0.8)' }}>
            {isVictory ? 'VICTORY' : 'DEFEAT'}
          </h1>
          <p style={{ color: '#9ca3af', fontSize: 18, marginBottom: 32 }}>
            {isVictory ? '우주를 통일하였습니다!' : '모든 행성을 잃었습니다...'}
          </p>

          {/* 전투 결과 */}
          <div style={{ background: 'rgba(17,24,39,0.95)', border: '1px solid rgba(255,255,255,0.1)',
                        borderRadius: 16, padding: '28px 36px', minWidth: 380, maxWidth: 480, marginBottom: 32 }}>
            <h3 style={{ color: '#93c5fd', fontSize: 18, fontWeight: 'bold', marginBottom: 16, textAlign: 'center',
                         letterSpacing: '0.1em' }}>전투 결과</h3>

            {/* 생산한 병력 */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ color: '#6ee7b7', fontSize: 13, fontWeight: 'bold', marginBottom: 8 }}>🚀 생산한 병력</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12 }}>
                <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '8px 12px', textAlign: 'center' }}>
                  <div style={{ color: '#9ca3af', fontSize: 11 }}>▲ 요격기</div>
                  <div style={{ color: '#fff', fontSize: 20, fontWeight: 'bold' }}>{s.produced[1]}</div>
                </div>
                <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '8px 12px', textAlign: 'center' }}>
                  <div style={{ color: '#9ca3af', fontSize: 11 }}>■ 구축함</div>
                  <div style={{ color: '#fff', fontSize: 20, fontWeight: 'bold' }}>{s.produced[2]}</div>
                </div>
                <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '8px 12px', textAlign: 'center' }}>
                  <div style={{ color: '#9ca3af', fontSize: 11 }}>● 전함</div>
                  <div style={{ color: '#fff', fontSize: 20, fontWeight: 'bold' }}>{s.produced[3]}</div>
                </div>
              </div>
            </div>

            {/* 처치한 적 병력 */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ color: '#fca5a5', fontSize: 13, fontWeight: 'bold', marginBottom: 8 }}>💀 처치한 적 병력</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12 }}>
                <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '8px 12px', textAlign: 'center' }}>
                  <div style={{ color: '#9ca3af', fontSize: 11 }}>맹독충</div>
                  <div style={{ color: '#ff6677', fontSize: 20, fontWeight: 'bold' }}>{s.kills[1]}</div>
                </div>
                <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '8px 12px', textAlign: 'center' }}>
                  <div style={{ color: '#9ca3af', fontSize: 11 }}>칼날벌레</div>
                  <div style={{ color: '#ff6677', fontSize: 20, fontWeight: 'bold' }}>{s.kills[2]}</div>
                </div>
                <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '8px 12px', textAlign: 'center' }}>
                  <div style={{ color: '#9ca3af', fontSize: 11 }}>거대갑충</div>
                  <div style={{ color: '#ff6677', fontSize: 20, fontWeight: 'bold' }}>{s.kills[3]}</div>
                </div>
              </div>
            </div>

            {/* 자원 / 점령 */}
            <div style={{ display: 'flex', gap: 12 }}>
              <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '10px 12px', textAlign: 'center' }}>
                <div style={{ color: '#fbbf24', fontSize: 12, marginBottom: 4 }}>⬡ 획득 골드</div>
                <div style={{ color: '#fbbf24', fontSize: 22, fontWeight: 'bold' }}>{s.goldEarned}G</div>
              </div>
              <div style={{ flex: 1, background: 'rgba(0,0,0,0.3)', borderRadius: 8, padding: '10px 12px', textAlign: 'center' }}>
                <div style={{ color: '#67e8f9', fontSize: 12, marginBottom: 4 }}>🪐 점령 행성</div>
                <div style={{ color: '#67e8f9', fontSize: 22, fontWeight: 'bold' }}>{s.planetsCaptured}개</div>
              </div>
            </div>
          </div>

          {/* 버튼 */}
          <div style={{ display: 'flex', gap: 16 }}>
            <button
              onClick={initGame}
              style={{ padding: '14px 36px', background: '#2563eb', color: '#fff', fontSize: 18, fontWeight: 'bold',
                       borderRadius: 10, border: 'none', cursor: 'pointer', transition: 'all 0.2s',
                       boxShadow: '0 0 20px rgba(68,153,255,0.4)' }}
              onMouseEnter={e => e.target.style.background = '#3b82f6'}
              onMouseLeave={e => e.target.style.background = '#2563eb'}>
              다시하기
            </button>
            <button
              onClick={() => {
                const g2 = G.current;
                g2.phase = 'start';
                g2.gameResult = '';
                setUi(prev => ({ ...prev, phase: 'start', gameResult: '' }));
              }}
              style={{ padding: '14px 36px', background: '#374151', color: '#e5e7eb', fontSize: 18, fontWeight: 'bold',
                       borderRadius: 10, border: 'none', cursor: 'pointer', transition: 'all 0.2s' }}
              onMouseEnter={e => e.target.style.background = '#4b5563'}
              onMouseLeave={e => e.target.style.background = '#374151'}>
              시작화면
            </button>
          </div>
        </div>
        );
      })()}
    </div>
  );
};

// ==================== MOUNT ====================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
