              position: 'absolute', width: 25, height: 1, top: 0,
              background: 'linear-gradient(90deg, transparent, rgba(60,180,255,0.6), rgba(60,180,255,0.2))',
              animation: 'shipFly 10s linear infinite 3s',
            }} />
          </div>
          <div className="absolute pointer-events-none" style={{ left: 0, top: '60%', width: '100%', height: 1 }}>
            <div style={{
              position: 'absolute', width: 30, height: 1, top: 0,
              background: 'linear-gradient(90deg, transparent, rgba(70,190,255,0.7), rgba(70,190,255,0.2))',
              animation: 'shipFly 12s linear infinite 6s',
            }} />
          </div>

          {/* Large planet (bottom right, partially visible) */}
          <div className="absolute" style={{
            width: 'min(700px, 80vw)',
            height: 'min(700px, 80vw)',
            right: '-5%',
            bottom: '-35%',
            borderRadius: '50%',
            background: 'radial-gradient(circle at 35% 35%, #2a4a6a 0%, #1a3050 30%, #0f2035 60%, #080e18 100%)',
            animation: 'planetGlow 6s ease-in-out infinite',
          }}>
            {/* Atmosphere rim */}
            <div className="absolute inset-0 rounded-full" style={{
              background: 'radial-gradient(circle at 30% 30%, transparent 55%, rgba(40,120,200,0.12) 70%, rgba(30,100,180,0.06) 85%, transparent 100%)',
            }} />
            {/* Surface hint */}
            <div className="absolute rounded-full" style={{
              width: '90%', height: '90%', top: '5%', left: '5%',
              background: 'radial-gradient(ellipse at 40% 40%, rgba(60,100,140,0.1) 0%, transparent 50%)',
            }} />
          </div>

          {/* Content area - centered */}
          <div className="absolute inset-0 flex flex-col items-center justify-center" style={{ paddingBottom: '5vh' }}>

            {/* Title block */}
            <div style={{ animation: 'fadeSlideUp 1.5s ease-out' }}>
              {/* Small accent line above title */}
              <div className="mx-auto mb-5" style={{
                width: 50, height: 1,
                background: 'rgba(80,200,160,0.5)',
                boxShadow: '0 0 8px rgba(80,200,160,0.3)',
              }} />

              {/* Main title */}
              <h1 className="text-center" style={{
                fontSize: 'clamp(2.8rem, 7vw, 5.5rem)',
                fontWeight: 300,
                letterSpacing: '0.35em',
                color: '#e0eef8',
                fontFamily: "'Segoe UI', 'Helvetica Neue', Arial, sans-serif",
                textShadow: '0 0 40px rgba(40,120,180,0.15)',
                lineHeight: 1,
              }}>
                SPACE<span style={{ color: 'rgba(80,200,160,0.9)', fontWeight: 300 }}>BATTLE</span>FLEET
              </h1>

              {/* Small accent line below title */}
              <div className="mx-auto mt-5" style={{
                width: 50, height: 1,
                background: 'rgba(80,200,160,0.5)',
                boxShadow: '0 0 8px rgba(80,200,160,0.3)',
              }} />
            </div>

            {/* Tagline */}
            <p className="mt-6 mb-14 text-center" style={{
              color: 'rgba(150,180,210,0.5)',
              fontSize: 'clamp(0.7rem, 1.3vw, 0.95rem)',
              letterSpacing: '0.25em',
              fontWeight: 300,
              animation: 'fadeSlideUp 1.8s ease-out',
            }}>
              REAL-TIME SPACE TERRITORY CONQUEST SIMULATION
            </p>

            {/* Start button - clean, minimal */}
            <button
              onClick={initGame}
              className="relative px-14 py-3.5 transition-all duration-300 hover:scale-105 active:scale-95"
              style={{
                background: 'transparent',
                border: '1px solid rgba(80,200,160,0.4)',
                borderRadius: 2,
                color: 'rgba(80,200,160,0.9)',
                fontSize: 'clamp(0.85rem, 1.2vw, 1rem)',
                fontWeight: 400,
                letterSpacing: '0.3em',
                cursor: 'pointer',
                animation: 'fadeSlideUp 2s ease-out, btnIdle 3s ease-in-out infinite 2s',
                textShadow: '0 0 10px rgba(80,200,160,0.2)',
              }}
              onMouseEnter={(e) => {
                e.target.style.background = 'rgba(80,200,160,0.1)';
                e.target.style.borderColor = 'rgba(80,200,160,0.7)';
                e.target.style.color = 'rgba(120,230,190,1)';
              }}
              onMouseLeave={(e) => {
                e.target.style.background = 'transparent';
                e.target.style.borderColor = 'rgba(80,200,160,0.4)';
                e.target.style.color = 'rgba(80,200,160,0.9)';
              }}>
              게임 시작
            </button>

            {/* Controls info */}
            <div className="mt-16 text-center space-y-2" style={{ animation: 'fadeSlideUp 2.4s ease-out' }}>
              <p style={{ color: 'rgba(120,150,180,0.35)', fontSize: '0.7rem', letterSpacing: '0.1em' }}>
                WASD / 방향키: 카메라 이동 &nbsp;&middot;&nbsp; 좌클릭: 선택 &nbsp;&middot;&nbsp; 우클릭: 명령
              </p>
              <p style={{ color: 'rgba(120,150,180,0.35)', fontSize: '0.7rem', letterSpacing: '0.1em' }}>
                F1~F2: 병력 선택 &nbsp;&middot;&nbsp; F3~F4: 행성 선택 &nbsp;&middot;&nbsp; 1~4: 부대 관리
              </p>
            </div>
          </div>

          {/* Bottom fade-out gradient */}
          <div className="absolute bottom-0 left-0 right-0 pointer-events-none" style={{
            height: '15%',
            background: 'linear-gradient(transparent, rgba(4,8,16,0.8))',
          }} />
        </div>
      )}

      {/* ---- HUD ---- */}
      {ui.phase === 'playing' && (
        <>
          {/* Resource display */}
          <div className="absolute top-4 left-4 z-40 space-y-1">
            <div className="bg-black/60 backdrop-blur px-4 py-2 rounded-lg border border-white/10">
              <span className="text-yellow-400 font-bold text-lg">
                ⬡ {ui.playerGold} G
              </span>
              <span className="text-gray-400 mx-3">|</span>
              <span className="text-blue-300 font-bold text-lg">
                ♦ {ui.playerPop} / {MAX_POP}
              </span>
            </div>
          </div>

          {/* Selected units count */}
          {ui.selectedUnitsCount > 0 && (
            <div className="absolute top-4 right-[330px] z-40">
              <div className="bg-black/60 backdrop-blur px-4 py-2 rounded-lg border border-white/10">
                <span className="text-green-300 font-bold text-lg">
                  유닛 선택: {ui.selectedUnitsCount}기
                </span>
              </div>
            </div>
          )}

          {/* Control Groups UI */}
          <div className="absolute bottom-4 left-4 z-40 flex gap-2">
            {[1,2,3,4].map(num => {
              const count = ui.controlGroupCounts[num];
              return (
                <button
                  key={num}
                  onClick={() => {
                    const g = G.current;
                    const group = g.controlGroups[num];
                    if (group && group.size > 0) {
                      const alive = new Set();
                      for (const id of group) {
                        if (g.units.some(u => u.id === id && u.hp > 0)) alive.add(id);
                      }
                      g.controlGroups[num] = alive;
                      if (alive.size > 0) {
                        g.selectedUnitIds = new Set(alive);
                        g.selectedPlanetIds.clear();
                      }
                    }
                  }}
                  className={`w-14 h-14 rounded-lg border text-center flex flex-col items-center justify-center
                    transition-all duration-150
                    ${count > 0
                      ? 'bg-blue-900/70 border-blue-400/50 hover:bg-blue-800/70'
                      : 'bg-black/50 border-white/10 opacity-50'}`}>
                  <span className="text-white font-bold text-lg leading-none">{num}</span>
                  <span className={`text-xs leading-none mt-0.5 ${count > 0 ? 'text-blue-300' : 'text-gray-500'}`}>
                    {count > 0 ? `${count}기` : '비어있음'}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Control Panel (when planets selected) */}
          {hasSelectedPlanets && (
            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 z-40">
              <div className="bg-black/80 backdrop-blur-md px-6 py-4 rounded-xl border border-white/15
                              flex items-center gap-6">
                {/* Planet info */}
                <div className="text-white">
                  <div className="text-sm text-gray-400">선택된 행성</div>
                  <div className="text-lg font-bold text-blue-300">
                    {selectedPlanetData.length}개
                    {selectedPlanetData.length === 1 && (
                      <span className="text-sm font-normal text-gray-400 ml-2">
                        HP: {Math.floor(selectedPlanetData[0].hp)}/{selectedPlanetData[0].maxHp}
                        &nbsp;&nbsp;Lv: {selectedPlanetData[0].level}
                      </span>
                    )}
                  </div>
                </div>

                <div className="w-px h-10 bg-white/20" />

                {/* Production buttons */}
                <div className="flex gap-2">
                  <span className="text-gray-400 text-sm mr-1 self-center">생산:</span>
                  {[1, 2, 3].map(type => (
                    <button
                      key={type}
                      onClick={() => changeProduction(type)}
                      className={`px-4 py-2 rounded-lg text-sm font-bold transition-all
                        ${currentProdType === type
                          ? 'bg-blue-600 text-white ring-2 ring-blue-400'
                          : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>
                      {type === 1 ? '▲ 요격기' : type === 2 ? '■ 구축함' : '● 전함'}
                    </button>
                  ))}
                </div>

                <div className="w-px h-10 bg-white/20" />

                {/* Upgrade button */}
                <button
                  onClick={upgradePlanets}
                  disabled={ui.playerGold < upgradeCost}
                  className={`px-5 py-2 rounded-lg text-sm font-bold transition-all
                    ${ui.playerGold >= upgradeCost
                      ? 'bg-yellow-600 hover:bg-yellow-500 text-white'
                      : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                  레벨 업그레이드 ({upgradeCost}G)
                </button>
              </div>
            </div>
          )}
        </>
      )}

      {/* ---- GAME OVER SCREEN ---- */}
      {ui.phase === 'gameover' && (
        <div className="absolute inset-0 flex flex-col items-center justify-center z-50 bg-black/80">
          <h1
            className={`text-8xl font-black mb-8 ${ui.gameResult === 'victory' ? 'text-blue-400' : 'text-red-500'}`}
            style={{textShadow: ui.gameResult === 'victory'
              ? '0 0 40px rgba(68,153,255,0.8)' : '0 0 40px rgba(255,68,85,0.8)'}}>
            {ui.gameResult === 'victory' ? 'VICTORY' : 'DEFEAT'}
          </h1>
          <p className="text-gray-400 text-xl mb-12">
            {ui.gameResult === 'victory' ? '우주를 통일하였습니다!' : '모든 행성을 잃었습니다...'}
          </p>
          <button
            onClick={initGame}
            className="px-12 py-4 bg-blue-600 hover:bg-blue-500 text-white text-xl font-bold rounded-lg
                       transition-all duration-200 hover:scale-105"
            style={{boxShadow: '0 0 20px rgba(68,153,255,0.5)'}}>
            다시 시작
          </button>
        </div>
      )}
    </div>
  );
};

// ==================== MOUNT ====================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
